<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ══════════════════════════════════
   UTILS
══════════════════════════════════ */
const fmtPrice = (n, cat) => {
  if (n == null || isNaN(n)) return '—';
  if (cat === 'forex') {
    // No $ sign — just the numeric rate
    if (n >= 100) return n.toFixed(3);
    if (n >= 10)  return n.toFixed(4);
    return n.toFixed(5);
  }
  if (n >= 10000) return '$' + n.toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:2 });
  if (n >= 1000)  return '$' + n.toFixed(2);
  if (n >= 1)     return '$' + n.toFixed(2);
  return '$' + n.toFixed(4);
};

const chartFmt = (n) => {
  if (n >= 10000) return n.toLocaleString('en-US', { maximumFractionDigits:0 });
  if (n >= 1000)  return n.toFixed(2);
  if (n >= 1)     return n.toFixed(3);
  return n.toFixed(5);
};

// Stable history cache — no flicker between renders
const HC = {};
const getHistory = (id, base, vol = 0.013, pts = 120) => {
  const c = HC[id];
  if (c && Math.abs(c.base - base) / c.base < 0.004) return c.data;
  const data = []; let p = base * (1 - vol * 4);
  const seed = id.split('').reduce((a,ch) => a + ch.charCodeAt(0), 0);
  for (let i = 0; i < pts; i++) {
    const tr = Math.sin(i / 10 + seed * 0.07) * vol * 0.45;
    const ns = (Math.sin(i * 7.3 + seed * 0.31) * 0.5 - 0.22) * vol;
    const o = p, cl = p * (1 + tr + ns);
    const h_ = Math.max(o, cl) * (1 + Math.abs(Math.sin(i * 1.73 + seed)) * vol * 0.28);
    const l_ = Math.min(o, cl) * (1 - Math.abs(Math.sin(i * 2.31 + seed)) * vol * 0.28);
    data.push({ time: Date.now() - (pts - i) * 60000, open: o, close: cl, high: h_, low: l_,
      volume: 400 + Math.abs(Math.sin(i * 1.1 + seed * 0.4)) * 1200 });
    p = cl;
  }
  HC[id] = { base, data };
  return data;
};

const calcSMA = (data, period) => data.map((_, i) => {
  if (i < period - 1) return null;
  return data.slice(i - period + 1, i + 1).reduce((s, d) => s + d.close, 0) / period;
});

const roundRect_ = (ctx, x, y, w, h, r) => {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
};

const useNews = () => {
  const [news, setNews] = useState([]);
  const [status, setStatus] = useState('loading');
  const fetch_ = async () => {
    const feeds = [
      'https://feeds.reuters.com/reuters/businessNews',
      'https://feeds.reuters.com/reuters/MXTopNews',
    ];
    let items = [];
    for (const url of feeds) {
      try {
        const r = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&count=8`, { signal: AbortSignal.timeout(9000) });
        const d = await r.json();
        if (d.status === 'ok' && d.items?.length) {
          const isMX = url.includes('MX');
          const clsList = ['ti-p','ti-n','ti-u'];
          const ttList  = ['tt-p','tt-n','tt-u'];
          items.push(...d.items.map((it, i) => ({
            title: it.title, link: it.link,
            source: isMX ? 'Reuters MX' : 'Reuters',
            cls: clsList[i % 3], tt: ttList[i % 3],
            tag: isMX ? 'MX' : 'WORLD',
            speech: it.title,
          })));
        }
      } catch(_) {}
    }
    if (items.length > 0) { setNews(items); setStatus('live'); }
    else { setNews(FALLBACK_NEWS); setStatus('fallback'); }
  };
  useEffect(() => { fetch_(); const t = setInterval(fetch_, 5 * 60000); return () => clearInterval(t); }, []);
  return { news, status };
};

};

  const fetch_ = async () => {

        out[id] = { id, name, symbol:sym, icon, category:'crypto', price: d[key].usd, change: d[key].usd_24h_change ?? 0 };

      addC('eth','ethereum','Ethereum','ETH','⟠');
      addC('sol','solana','Solana','SOL','◎');
      addC('bnb','binancecoin','BNB','BNB','🔶');
      addC('xrp','ripple','Ripple','XRP','💧');
      addC('ada','cardano','Cardano','ADA','₳');
      addC('doge','dogecoin','Dogecoin','DOGE','🐕');
      addC('dot','polkadot','Polkadot','DOT','⚫');
      addC('avax','avalanche-2','Avalanche','AVAX','🔺');
      addC('link','chainlink','Chainlink','LINK','⛓');
      st.crypto = 'ok';
    } catch(e) { st.crypto = 'fail'; }

    /* 2. METALS SPOT — metals.live (free, CORS enabled) */
    try {
      const r = await fetch('https://api.metals.live/v1/spot', { signal: AbortSignal.timeout(8000) });
      const arr = await r.json();
      const m = {}; arr.forEach(obj => Object.assign(m, obj));
      const addM = (id, name, sym, icon, key, fb) =>
        out[id] = { id, name, symbol:sym, icon, category:'metales', price: +(m[key] ?? fb), change: 0 };
      addM('gold',     'Oro (spot)',      'XAU','🥇','gold',      2340);
      addM('silver',   'Plata (spot)',    'XAG','🥈','silver',    28.5);
      addM('platinum', 'Platino (spot)', 'XPT','⚪','platinum',  980);
      addM('palladium','Paladio (spot)', 'XPD','🔘','palladium', 1020);
      addM('copper',   'Cobre (spot)',   'HG', '🟤','copper',    4.5);
      st.metals = 'ok';
    } catch(e) {
      st.metals = 'warn';
      [['gold','Oro','XAU','🥇',2340],['silver','Plata','XAG','🥈',28.5],
       ['platinum','Platino','XPT','⚪',980],['palladium','Paladio','XPD','🔘',1020],
       ['copper','Cobre','HG','🟤',4.5]].forEach(([id,n,s,i,p]) =>
        out[id] = { id, name:n, symbol:s, icon:i, category:'metales', price:p, change:0 });
    }

    /* 3. YAHOO FINANCE BATCH — forex + energy + indices + agro (via corsproxy) */
    try {
      const syms = Object.keys(YAHOO_MAP).join(',');
      const url  = `https://corsproxy.io/?${encodeURIComponent('https://query1.finance.yahoo.com/v7/finance/quote?symbols=' + syms)}`;
      const r    = await fetch(url, { signal: AbortSignal.timeout(14000) });
      const d    = await r.json();
      const results = d?.quoteResponse?.result || [];

      results.forEach(q => {
        const meta = YAHOO_MAP[q.symbol];
        if (!meta || q.regularMarketPrice == null) return;
        const entry = {
          ...meta,
          price:  q.regularMarketPrice,
          change: q.regularMarketChangePercent ?? 0,
        };
        // For metals — supplement change% from Yahoo futures if metals.live gave 0
        if (meta.category === 'metales' && out[meta.id]) {
          out[meta.id] = { ...out[meta.id], change: entry.change };
        } else {
          out[meta.id] = entry;
        }
      });

      const yahooCount = results.length;
      st.forex  = results.some(q => YAHOO_MAP[q.symbol]?.category === 'forex')   ? 'ok' : 'warn';
      st.yahoo  = yahooCount > 10 ? 'ok' : yahooCount > 0 ? 'warn' : 'fail';
    } catch(e) {
      st.forex = 'warn'; st.yahoo = 'fail';
      /* Forex fallback — ExchangeRate-API (daily rates, no 24h change) */
      try {
        const r = await fetch('https://open.er-api.com/v6/latest/USD', { signal: AbortSignal.timeout(8000) });
        const d = await r.json();
        if (d.rates) {
          const addFx = (id, name, sym, icon, price) =>
            out[id] = { id, name, symbol:sym, icon, category:'forex', price, change:0 };
          addFx('eurusd','EUR / USD','EUR','🇪🇺', +(1/d.rates.EUR).toFixed(5));
          addFx('gbpusd','GBP / USD','GBP','🇬🇧', +(1/d.rates.GBP).toFixed(5));
          addFx('usdjpy','USD / JPY','JPY','🇯🇵', +d.rates.JPY.toFixed(3));
          addFx('usdchf','USD / CHF','CHF','🇨🇭', +d.rates.CHF.toFixed(5));
          addFx('audusd','AUD / USD','AUD','🇦🇺', +(1/d.rates.AUD).toFixed(5));
          addFx('nzdusd','NZD / USD','NZD','🇳🇿', +(1/d.rates.NZD).toFixed(5));
          addFx('usdcad','USD / CAD','CAD','🍁',  +d.rates.CAD.toFixed(5));
          addFx('usdmxn','USD / MXN','MXN','🇲🇽', +d.rates.MXN.toFixed(4));
          addFx('usdcny','USD / CNY','CNY','🇨🇳', +d.rates.CNY.toFixed(4));
          addFx('usdbrl','USD / BRL','BRL','🇧🇷', +d.rates.BRL.toFixed(4));
          addFx('usdars','USD / ARS','ARS','🇦🇷', +d.rates.ARS.toFixed(2));
          addFx('usdclp','USD / CLP','CLP','🇨🇱', +d.rates.CLP.toFixed(2));
          st.forex = 'warn'; // daily, no change%
        }
      } catch(_) {}
    }

    setApiStatus(st);
    if (Object.keys(out).length > 0) {
      setData(prev => ({ ...prev, ...out }));
      setLastUpdate(new Date());
      setLoading(false);
    }
  };

  useEffect(() => { fetch_(); const t = setInterval(fetch_, 22000); return () => clearInterval(t); }, []);
  return { data, loading, lastUpdate, apiStatus };
};

/* ══════════════════════════════════
   VOICE HOOK
══════════════════════════════════ */
const useVoice = () => {
  const [on, setOn] = useState(false);
  const synth = useRef(window.speechSynthesis);
  const voice = useRef(null);
  useEffect(() => {
    const load = () => {
      const vv = synth.current.getVoices();
      voice.current = vv.find(v => v.lang.startsWith('es') && v.name.toLowerCase().includes('google'))
        ?? vv.find(v => v.lang.startsWith('es')) ?? vv[0];
    };
    load(); synth.current.onvoiceschanged = load;
  }, []);
  const speak = useCallback((txt, hi = false) => {
    if (!on) return;
    if (hi) synth.current.cancel();
    const u = new SpeechSynthesisUtterance(txt);
    if (voice.current) u.voice = voice.current;
    u.lang = 'es-ES'; u.rate = 0.9; u.volume = 0.85;
    synth.current.speak(u);
  }, [on]);
  const toggle = useCallback(() => { if (on) synth.current.cancel(); setOn(v => !v); }, [on]);
  return { on, toggle, speak };
};

/* ══════════════════════════════════
   AUDIO HOOK
══════════════════════════════════ */
const useAudio = () => {
  const ctx = useRef(null);
  useEffect(() => { ctx.current = new (window.AudioContext || window.webkitAudioContext)(); }, []);
  const tone = (hz, dur, vol = 0.06) => {
    if (!ctx.current) return;
    try {
      const o = ctx.current.createOscillator(), g = ctx.current.createGain();
      o.connect(g); g.connect(ctx.current.destination);
      o.frequency.value = hz; o.type = 'sine';
      g.gain.setValueAtTime(vol, ctx.current.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.current.currentTime + dur);
      o.start(); o.stop(ctx.current.currentTime + dur);
    } catch(_) {}
  };
  return {
    click:   () => { tone(880, 0.08, 0.11); setTimeout(() => tone(1200, 0.06, 0.08), 22); },
    hover:   () => tone(650, 0.04, 0.04),
    success: () => { tone(523, 0.12, 0.13); setTimeout(() => tone(659, 0.12, 0.13), 85); setTimeout(() => tone(784, 0.18, 0.13), 170); },
  };
};

/* ══════════════════════════════════
   MINI CHART
══════════════════════════════════ */
const MiniChart = React.memo(({ id, price, up, w = 88, h = 26 }) => {
  const ref = useRef(null);
  useEffect(() => {
    const canvas = ref.current; if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = w * dpr; canvas.height = h * dpr;
    const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr); ctx.clearRect(0, 0, w, h);
    const hist = getHistory(id, price, price > 1 ? 0.012 : 0.008, 40);
    const vals = hist.map(d => d.close);
    const mn = Math.min(...vals), mx = Math.max(...vals), rng = mx - mn || 1;
    const col = up ? '#00e5a0' : '#ff3060';
    const grd = ctx.createLinearGradient(0, 0, 0, h);
    grd.addColorStop(0, col + '24'); grd.addColorStop(1, col + '04');
    ctx.beginPath(); ctx.moveTo(0, h);
    vals.forEach((v, i) => ctx.lineTo((i / (vals.length - 1)) * w, h - ((v - mn) / rng) * (h - 3) - 1.5));
    ctx.lineTo(w, h); ctx.closePath(); ctx.fillStyle = grd; ctx.fill();
    ctx.beginPath();
    vals.forEach((v, i) => { const x = (i/(vals.length-1))*w, y = h-((v-mn)/rng)*(h-3)-1.5; i?ctx.lineTo(x,y):ctx.moveTo(x,y); });
    ctx.strokeStyle = col; ctx.lineWidth = 1.5; ctx.shadowColor = col; ctx.shadowBlur = 3; ctx.stroke(); ctx.shadowBlur = 0;
  }, [id, price, up, w, h]);
  return <canvas ref={ref} style={{ width: w, height: h, display: 'block' }} />;
});

/* ══════════════════════════════════
   LARGE CANDLESTICK CHART (premium)
══════════════════════════════════ */
const LargeChart = React.memo(({ asset, price, w, h, snd }) => {
  const ref = useRef(null);
  const [hovIdx, setHovIdx] = useState(null);
  const [ttPos,  setTtPos]  = useState({ x: 0, y: 0 });

  const hist = useMemo(
    () => getHistory(asset.id, price, price > 100 ? 0.016 : 0.010, 120),
    // eslint-disable-next-line
    [asset.id, Math.round(price * 200) / 200]
  );
  const sma20 = useMemo(() => calcSMA(hist, 20), [hist]);

  useEffect(() => {
    const canvas = ref.current; if (!canvas || hist.length < 2) return;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = w * dpr; canvas.height = h * dpr;
    const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr); ctx.clearRect(0, 0, w, h);

    // ── Layout
    const pad = { top: 52, right: 84, bottom: 46, left: 8 };
    const totalH = h - pad.top - pad.bottom;
    const volSplit = 0.20;
    const priceH = totalH * (1 - volSplit);
    const volH   = totalH * volSplit - 8;
    const priceTop = pad.top;
    const priceBot = priceTop + priceH;
    const volTop   = priceBot + 10;
    const volBot   = h - pad.bottom;
    const chartW   = w - pad.left - pad.right;
    const n        = hist.length;
    const cw_      = Math.max(2, (chartW / n) * 0.66);

    // ── Price range (include SMA in bounds)
    let pMin = Math.min(...hist.map(d => d.low))  * 0.9988;
    let pMax = Math.max(...hist.map(d => d.high)) * 1.0012;
    const smaVals = sma20.filter(v => v !== null);
    if (smaVals.length) {
      pMin = Math.min(pMin, Math.min(...smaVals) * 0.999);
      pMax = Math.max(pMax, Math.max(...smaVals) * 1.001);
    }
    const pRange = pMax - pMin || 1;
    const toX  = i => pad.left + (i / (n - 1)) * chartW;
    const toY  = v => priceTop + priceH - ((v - pMin) / pRange) * priceH;
    const maxV = Math.max(...hist.map(d => d.volume));
    const toVY = v => volBot - ((v / maxV) * (volBot - volTop));

    // ── Background gradient
    const bgG = ctx.createLinearGradient(0, 0, 0, h);
    bgG.addColorStop(0, '#030d1c'); bgG.addColorStop(1, '#020810');
    ctx.fillStyle = bgG; ctx.fillRect(0, 0, w, h);

    // Depth glow
    const depG = ctx.createRadialGradient(w*0.5, h*0.35, 0, w*0.5, h*0.35, w*0.6);
    depG.addColorStop(0, 'rgba(0,180,220,.025)'); depG.addColorStop(1, 'transparent');
    ctx.fillStyle = depG; ctx.fillRect(0, 0, w, h);

    // ── Grid lines
    const gridN = 6;
    for (let i = 0; i <= gridN; i++) {
      const y = priceTop + (i / gridN) * priceH;
      const v = pMax - (i / gridN) * pRange;
      ctx.strokeStyle = (i === 0 || i === gridN) ? '#182840' : '#0d1e33';
      ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(w - pad.right, y); ctx.stroke();
      ctx.fillStyle = '#2d4a66';
      ctx.font = '10px JetBrains Mono'; ctx.textAlign = 'left';
      ctx.fillText(chartFmt(v), w - pad.right + 8, y + 3.5);
    }

    // Vertical grid (every ~20 candles)
    const vStep = Math.max(15, Math.floor(n / 6));
    for (let i = vStep; i < n; i += vStep) {
      const x = toX(i);
      ctx.strokeStyle = '#0d1e33'; ctx.lineWidth = 0.4;
      ctx.beginPath(); ctx.moveTo(x, priceTop); ctx.lineTo(x, priceBot); ctx.stroke();
      const t = new Date(hist[i].time);
      ctx.fillStyle = '#243550'; ctx.font = '9px JetBrains Mono'; ctx.textAlign = 'center';
      ctx.fillText(t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0'), x, h - pad.bottom + 16);
    }

    // Volume separator
    ctx.strokeStyle = '#101e30'; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(pad.left, volTop - 5); ctx.lineTo(w - pad.right, volTop - 5); ctx.stroke();

    // ── Volume bars
    hist.forEach((d, i) => {
      const x = toX(i), vy = toVY(d.volume);
      const isG = d.close >= d.open;
      ctx.fillStyle = isG ? 'rgba(0,229,160,.22)' : 'rgba(255,48,96,.22)';
      ctx.fillRect(x - cw_/2, vy, cw_, volBot - vy);
    });

    // Volume MA10
    const vma10 = hist.map((_, i) => {
      if (i < 9) return null;
      return hist.slice(i-9, i+1).reduce((s,d) => s + d.volume, 0) / 10;
    });
    ctx.beginPath(); let vmaS = false;
    hist.forEach((_, i) => {
      if (vma10[i] === null) return;
      const x = toX(i), y = toVY(vma10[i]);
      vmaS ? ctx.lineTo(x, y) : (ctx.moveTo(x, y), vmaS = true);
    });
    ctx.strokeStyle = 'rgba(240,168,32,.4)'; ctx.lineWidth = 1; ctx.stroke();

    // ── Candles
    hist.forEach((d, i) => {
      const x = toX(i), yO = toY(d.open), yC = toY(d.close);
      const yH = toY(d.high), yL = toY(d.low);
      const isG = d.close >= d.open;
      const col = isG ? '#00e5a0' : '#ff3060';

      ctx.shadowColor = col;
      ctx.shadowBlur  = hovIdx === i ? 10 : 2.5;

      // Wick
      ctx.strokeStyle = col; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x, yH); ctx.lineTo(x, yL); ctx.stroke();

      // Body
      const bTop = Math.min(yO, yC), bH = Math.max(1.5, Math.abs(yC - yO));
      ctx.fillStyle = isG ? 'rgba(0,229,160,.86)' : 'rgba(255,48,96,.88)';
      ctx.fillRect(x - cw_/2, bTop, cw_, bH);
    });
    ctx.shadowBlur = 0;

    // ── SMA 20 line
    ctx.beginPath(); let sS = false;
    hist.forEach((_, i) => {
      if (sma20[i] === null) return;
      const x = toX(i), y = toY(sma20[i]);
      sS ? ctx.lineTo(x, y) : (ctx.moveTo(x, y), sS = true);
    });
    ctx.strokeStyle = '#f0a820'; ctx.lineWidth = 1.4; ctx.setLineDash([]); ctx.stroke();

    // SMA label top-right of price area
    ctx.fillStyle = '#f0a820'; ctx.font = 'bold 9px JetBrains Mono'; ctx.textAlign = 'right';
    ctx.fillText('SMA 20', w - pad.right - 4, priceTop + 14);

    // ── Current price dashed line
    const lastClose = hist[hist.length - 1].close;
    const lastY     = toY(lastClose);
    ctx.setLineDash([5, 5]);
    ctx.strokeStyle = 'rgba(0,212,240,.55)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.left, lastY); ctx.lineTo(w - pad.right, lastY); ctx.stroke();
    ctx.setLineDash([]);

    // Current price tag
    const tagW = 76, tagH = 22, tagX = w - pad.right + 2, tagY2 = lastY - tagH / 2;
    ctx.shadowColor = '#00d4f0'; ctx.shadowBlur = 10;
    ctx.fillStyle = '#00d4f0';
    roundRect_(ctx, tagX, tagY2, tagW, tagH, 5); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#000'; ctx.font = 'bold 10px JetBrains Mono'; ctx.textAlign = 'center';
    ctx.fillText(chartFmt(lastClose), tagX + tagW / 2, lastY + 4);

    // ── Watermark
    ctx.fillStyle = 'rgba(30,60,100,.1)';
    ctx.font = 'bold 32px Chakra Petch'; ctx.textAlign = 'center';
    ctx.fillText('TRADEVIEW PRO', w / 2, h / 2 + 18);

    // ── Title
    ctx.fillStyle = '#7090b0'; ctx.font = '600 12px Chakra Petch'; ctx.textAlign = 'left';
    ctx.fillText(`${asset.symbol}  ·  ${asset.name}  ·  120 velas 1min`, pad.left + 10, priceTop - 18);
    ctx.fillStyle = '#1a3050'; ctx.font = '9px JetBrains Mono';
    ctx.fillText('historial visual · precio real en tiempo real', pad.left + 10, priceTop - 6);

    // ── Crosshair
    if (hovIdx !== null && hist[hovIdx]) {
      const hx = toX(hovIdx), hy = toY(hist[hovIdx].close);
      ctx.setLineDash([3, 3]);
      ctx.strokeStyle = 'rgba(80,140,200,.35)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(hx, priceTop); ctx.lineTo(hx, priceBot); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(pad.left, hy); ctx.lineTo(w - pad.right, hy); ctx.stroke();
      ctx.setLineDash([]);
      ctx.shadowColor = '#00d4f0'; ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.arc(hx, hy, 4, 0, Math.PI * 2);
      ctx.fillStyle = '#00d4f0'; ctx.fill(); ctx.shadowBlur = 0;
    }
  }, [hist, sma20, w, h, asset, hovIdx]);

  const onMove = (e) => {
    const rect = ref.current?.getBoundingClientRect(); if (!rect) return;
    const x = e.clientX - rect.left;
    const cw = w - 8 - 84;
    const idx = Math.round(((x - 8) / cw) * (hist.length - 1));
    if (idx >= 0 && idx < hist.length) { setHovIdx(idx); setTtPos({ x: e.clientX - rect.left, y: e.clientY - rect.top }); }
  };

  const hd = hovIdx !== null ? hist[hovIdx] : null;
  const smaNow = hovIdx !== null ? sma20[hovIdx] : null;

  return (
    <div style={{ position:'relative', lineHeight:0 }}>
      <canvas ref={ref}
        style={{ width:w, height:h, cursor:'crosshair', borderRadius:14, display:'block' }}
        onMouseMove={onMove} onMouseLeave={() => setHovIdx(null)} onMouseEnter={snd.hover} />
      {hd && (
        <div className="ctt" style={{
          left:  ttPos.x < w * 0.55 ? ttPos.x + 16 : ttPos.x - 192,
          top:   58,
        }}>
          <div style={{ color:'#2d4a66', marginBottom:8, fontSize:10, letterSpacing:'.5px' }}>
            {new Date(hd.time).toLocaleTimeString('es', { hour:'2-digit', minute:'2-digit' })}
          </div>
          {[
            ['OPEN',  hd.open,   hd.close >= hd.open ? '#00e5a0' : '#ff3060'],
            ['HIGH',  hd.high,   '#00e5a0'],
            ['LOW',   hd.low,    '#ff3060'],
            ['CLOSE', hd.close,  hd.close >= hd.open ? '#00e5a0' : '#ff3060'],
            ['VOL',   hd.volume, '#4a7090'],
          ].map(([l, v, c]) => (
            <div key={l} style={{ display:'flex', justifyContent:'space-between', gap:22, marginBottom:3 }}>
              <span style={{ color:'#1e3050', fontSize:9, letterSpacing:'.5px' }}>{l}</span>
              <span style={{ color:c, fontWeight:700 }}>
                {l === 'VOL' ? Math.round(v).toLocaleString() : chartFmt(v)}
              </span>
            </div>
          ))}
          {smaNow && (
            <div style={{ display:'flex', justifyContent:'space-between', gap:22, marginTop:6, paddingTop:6, borderTop:'1px solid #0d1e30' }}>
              <span style={{ color:'#1e3050', fontSize:9 }}>SMA 20</span>
              <span style={{ color:'#f0a820', fontWeight:700 }}>{chartFmt(smaNow)}</span>
            </div>
          )}
        </div>
      )}
    </div>
  );
});

    <div style={{ display:'flex', alignItems:'baseline', gap:12, marginBottom:14 }}>
      <div style={{ fontSize:18, fontWeight:700, letterSpacing:-.3 }}>$ DÓLAR AMERICANO</div>
      <div style={{ fontSize:10, color:'var(--tx2)', fontFamily:'JetBrains Mono' }}>
        tasas de mercado en tiempo real · Yahoo Finance
      </div>
    </div>
    <div className="dollar-panel">
      {DOLLAR_FEATURED.map(f => {
        const d = data[f.id];
        const up = (d?.change ?? 0) >= 0;
        return (
          <div key={f.id} className="dcard" style={{ borderColor: d ? (up ? 'rgba(0,229,160,.18)' : 'rgba(255,48,96,.18)') : 'var(--b0)' }}>
            <div className="dcard-stripe" style={{ background: d ? (up ? 'var(--green)' : 'var(--red)') : 'var(--b0)' }} />
            <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:10 }}>
              <span style={{ fontSize:20 }}>{d?.icon || '🌐'}</span>
              <div>
                <div style={{ fontWeight:700, fontSize:13 }}>{d?.symbol ?? f.id.toUpperCase()}</div>
                <div style={{ fontSize:9, color:'var(--tx2)' }}>{f.label}</div>
              </div>
            </div>
            {d ? (
              <>
                <div className="price-main" style={{ fontSize:24, marginBottom:6 }}>
                  {fmtPrice(d.price, 'forex')}
                </div>
                <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                  <span style={{ fontFamily:'JetBrains Mono', fontSize:12, fontWeight:700, color: up ? 'var(--green)' : 'var(--red)' }}>
                    {up ? '▲ +' : '▼ '}{Math.abs(d.change ?? 0).toFixed(4)}%
                  </span>
                </div>
                <div style={{ fontSize:9, color:'var(--tx2)', marginTop:6 }}>{f.desc}</div>
              </>
            ) : (
              <div style={{ fontFamily:'JetBrains Mono', fontSize:24, color:'var(--tx2)' }}>—</div>
            )}
          </div>
        );
      })}
    </div>
  </div>
);

/* ══════════════════════════════════
   FEAR & GREED BADGE
══════════════════════════════════ */
const FGBadge = ({ fg }) => {
  if (!fg) return null;
  const v   = parseInt(fg.value);
  const col = v < 25 ? '#ff3060' : v < 45 ? '#f97316' : v < 55 ? '#f0a820' : v < 75 ? '#84cc16' : '#00e5a0';
  const em  = v < 25 ? '😱' : v < 45 ? '😟' : v < 55 ? '😐' : v < 75 ? '🙂' : '🤑';
  return (
    <div className="fg-badge" style={{ borderColor:`${col}44`, background:`${col}11`, color:col }}>
      <span style={{ fontSize:14 }}>{em}</span>
      <div>
        <div style={{ fontSize:8, opacity:.65, letterSpacing:'.5px' }}>FEAR &amp; GREED</div>
        <div>{v} · {fg.value_classification}</div>
      </div>
    </div>
  );
};

/* ══════════════════════════════════
   STATS STRIP
══════════════════════════════════ */
const StatsStrip = ({ global, fg }) => {
  if (!global && !fg) return null;
  const mc   = global?.total_market_cap?.usd;
  const vol  = global?.total_volume?.usd;
  const btcd = global?.market_cap_percentage?.btc;
  const ethd = global?.market_cap_percentage?.eth;
  const fmt_ = n => n >= 1e12 ? `$${(n/1e12).toFixed(2)}T` : n >= 1e9 ? `$${(n/1e9).toFixed(1)}B` : '—';
  return (
    <div className="stats-strip">
      {mc   && <div className="spill"><span className="sl">MCAP</span><span className="sv">{fmt_(mc)}</span></div>}
      {vol  && <div className="spill"><span className="sl">VOL 24H</span><span className="sv">{fmt_(vol)}</span></div>}
      {btcd && <div className="spill"><span className="sl">BTC DOM.</span><span className="sv">{btcd.toFixed(1)}%</span></div>}
      {ethd && <div className="spill"><span className="sl">ETH DOM.</span><span className="sv">{ethd.toFixed(1)}%</span></div>}
      {global?.active_cryptocurrencies && <div className="spill"><span className="sl">CRYPTOS</span><span className="sv">{global.active_cryptocurrencies.toLocaleString()}</span></div>}
      {fg && <FGBadge fg={fg} />}
    </div>
  );
};

/* ══════════════════════════════════
   API STATUS
══════════════════════════════════ */
const ApiStatus = ({ st, newsStatus }) => {
  const pills = [
    ['CoinGecko',       st.crypto, 'Crypto'],
    ['metals.live',     st.metals, 'Metales spot'],
    ['Yahoo Finance',   st.yahoo,  'Forex · Energía · Índices · Agro'],
    ['rss2json/Reuters',newsStatus === 'live' ? 'ok' : 'warn', 'Noticias'],
    ['alternative.me',  'ok',      'Fear & Greed'],
  ];
  return (
    <div className="api-pills">
      {pills.map(([src, s, lbl]) => (
        <div key={lbl} className="api-pill">
          <div className="api-dot" style={{ background: s==='ok'?'var(--green)':s==='warn'?'var(--amber)':'var(--red)' }} />
          <span style={{ color:'var(--tx)' }}>{src}</span>
          <span style={{ color:'var(--tx2)' }}>·</span>
          <span style={{ color:'var(--tx2)' }}>{lbl}</span>
          <span style={{ color: s==='ok'?'var(--green)':s==='warn'?'var(--amber)':'var(--red)' }}>
            {s==='ok'?'LIVE':s==='warn'?'parcial':'error'}
          </span>
        </div>
      ))}
    </div>
  );
};

/* ══════════════════════════════════
   MARKET TABLE
══════════════════════════════════ */
const MarketTable = ({ assets, data, sel, onSel, onAnalyze, snd }) => {
  const [flashes, setFlashes] = useState({});
  const prev = useRef({});

  useEffect(() => {
    const nxt = {};
    assets.forEach(a => {
      const cur = data[a.id]?.price, prv = prev.current[a.id];
      if (cur != null && prv != null && cur !== prv) nxt[a.id] = cur > prv ? 'up' : 'dn';
      if (cur != null) prev.current[a.id] = cur;
    });
    if (Object.keys(nxt).length) { setFlashes(nxt); setTimeout(() => setFlashes({}), 560); }
  }, [assets, data]);

  if (!assets.length) return (
    <div style={{ textAlign:'center', padding:44, color:'var(--tx2)', background:'var(--bg2)', borderRadius:12, border:'1px solid var(--b0)' }}>
      <div className="spin" style={{ margin:'0 auto 12px' }} />
      <div>Cargando activos…</div>
    </div>
  );

  return (
    <div className="tbl">
      <div className="tbl-hd">
        <span>Activo</span>
        <span style={{ textAlign:'right' }}>Precio</span>
        <span style={{ textAlign:'right' }}>24h %</span>
        <span style={{ textAlign:'center' }}>Tendencia</span>
        <span style={{ textAlign:'center' }}>Análisis IA</span>
      </div>
      {assets.map(a => {
        const d = data[a.id]; if (!d) return null;
        const up = (d.change ?? 0) >= 0;
        const fl = flashes[a.id];
        return (
          <div key={a.id}
            className={`tbl-row${sel === a.id ? ' sel' : ''} ${fl === 'up' ? 'flash-up' : fl === 'dn' ? 'flash-dn' : ''}`}
            onClick={() => { snd.click(); onSel(a.id); }}
            onMouseEnter={snd.hover}>
            <div style={{ display:'flex', alignItems:'center', gap:11 }}>
              <span style={{ fontSize:20 }}>{d.icon}</span>
              <div>
                <div style={{ fontWeight:700, fontSize:13 }}>{d.symbol}</div>
                <div style={{ fontSize:10, color:'var(--tx2)' }}>{d.name}</div>
              </div>
            </div>
            <div style={{ textAlign:'right', fontFamily:'JetBrains Mono', fontWeight:700, fontSize:13 }}>
              {fmtPrice(d.price, d.category)}
            </div>
            <div style={{ textAlign:'right', fontFamily:'JetBrains Mono', fontWeight:700, fontSize:12,
              color: up ? 'var(--green)' : 'var(--red)' }}>
              {d.change != null && d.change !== 0
                ? (up ? '▲ +' : '▼ ') + Math.abs(d.change).toFixed(2) + '%'
                : '—'}
            </div>
            <div style={{ display:'flex', justifyContent:'center' }}>
              <MiniChart id={a.id} price={d.price} up={up} />
            </div>
            <div style={{ display:'flex', justifyContent:'center' }}>
              <button className="ana-btn"
                onClick={e => { e.stopPropagation(); snd.click(); onAnalyze(d); }}
                onMouseEnter={snd.hover}>
                🎤 Analizar
              </button>
            </div>
          </div>
        );
      })}
    </div>
  );
};

/* ══════════════════════════════════
   APP
══════════════════════════════════ */
const TABS = [
  { id:'crypto',  label:'₿ Crypto'   },
  { id:'forex',   label:'$ Divisas'  },
  { id:'metales', label:'🥇 Metales' },
  { id:'energia', label:'⚡ Energía' },
  { id:'indices', label:'📈 Índices' },
  { id:'agro',    label:'🌾 Agrícola'},
];

function App() {
  const { data, loading, lastUpdate, apiStatus } = useMarketData();
  const { news, status: newsStatus } = useNews();
  const fearGreed  = useFearGreed();
  const globalData = useCryptoGlobal();
  const voice = useVoice();
  const snd   = useAudio();
  const wrapR = useRef(null);

  const [tab,  setTab]  = useState('crypto');
  const [sel,  setSel]  = useState('btc');
  const [cw,   setCw]   = useState(900);
  const [ch,   setCh]   = useState(480);

  // Responsive chart sizing
  useEffect(() => {
    const upd = () => {
      if (!wrapR.current) return;
      setCw(Math.min(wrapR.current.offsetWidth - 2, 1320));
      setCh(window.innerWidth < 700 ? 300 : 480);
    };
    upd(); window.addEventListener('resize', upd); return () => window.removeEventListener('resize', upd);
  }, []);

  const tabAssets = useMemo(() => Object.values(data).filter(a => a?.category === tab), [data, tab]);

  // Auto-select first asset of tab if current selection is from another tab
  useEffect(() => {
    if (tabAssets.length && !tabAssets.find(a => a.id === sel)) setSel(tabAssets[0].id);
  }, [tab, tabAssets]);

  const selAsset = data[sel];

  const handleAnalyze = (d) => {
    const up  = (d.change ?? 0) >= 0;
    const cat = { crypto:'criptomoneda', forex:'par de divisas', metales:'metal precioso',
                  energia:'commodity energético', indices:'índice bursátil', agro:'materia prima agrícola' };
    const txt = `${d.name}. ${cat[d.category] || 'activo'}. `
      + `Precio actual: ${fmtPrice(d.price, d.category)}. `
      + (d.change ? `Variación 24 horas: ${up?'positiva':'negativa'} del ${Math.abs(d.change).toFixed(2)} por ciento. ` : '')
      + `Tendencia ${up ? 'alcista — momentum positivo, busca niveles de entrada en soporte' : 'bajista — espera confirmación de soporte antes de entrar'}.`;
    voice.speak(txt, true); snd.success();
  };

  return (
    <div style={{ minHeight:'100vh' }}>
      {/* HEADER */}
      <header className="hdr">
        <div className="logo">
          <div className="logo-ic">T</div>
          <div>
            <h1>TradeView <em>Pro AI</em></h1>
            <p>CRYPTO · FOREX · METALES · ENERGÍA · ÍNDICES · AGRO · 3 APIs REALES</p>
          </div>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:10, flexWrap:'wrap' }}>
          <div className="live-badge">
            <div className="live-dot" />
            {lastUpdate ? lastUpdate.toLocaleTimeString() : '-- : -- : --'}
          </div>
          <button className={`vbtn${voice.on ? ' on' : ''}`}
            onClick={() => { snd.click(); voice.toggle(); }} onMouseEnter={snd.hover}>
            {voice.on ? '🔊' : '🔇'} {voice.on ? 'Voz ON' : 'Voz OFF'}
          </button>
        </div>
      </header>

      {/* STATS STRIP */}
      <StatsStrip global={globalData} fg={fearGreed} />

      {/* NEWS TICKER */}
      <NewsTicker news={news} status={newsStatus} onSpeak={(t, hi) => voice.speak(t, hi)} snd={snd} />

      {/* MAIN */}
      <div ref={wrapR} style={{ maxWidth:1400, margin:'0 auto', padding:'16px 14px' }}>
        {loading ? (
          <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:14, padding:90 }}>
            <div className="spin" />
            <span style={{ color:'var(--tx2)', fontSize:12, fontFamily:'JetBrains Mono' }}>
              Conectando con CoinGecko · metals.live · Yahoo Finance…
            </span>
          </div>
        ) : (
          <>
            {/* LARGE CHART */}
            {selAsset && (
              <div className="fadein" style={{ marginBottom:14 }}>
                <LargeChart asset={selAsset} price={selAsset.price} w={cw} h={ch} snd={snd} />
                <div className="price-bar" style={{ marginTop:10 }}>
                  <div>
                    <div className="plbl">PRECIO ACTUAL</div>
                    <div className="price-main">{fmtPrice(selAsset.price, selAsset.category)}</div>
                  </div>
                  <div>
                    <div className="plbl">VARIACIÓN 24H</div>
                    <div className="price-chg" style={{ color:(selAsset.change??0)>=0?'var(--green)':'var(--red)' }}>
                      {selAsset.change != null && selAsset.change !== 0
                        ? ((selAsset.change>=0?'▲ +':'▼ ')+Math.abs(selAsset.change).toFixed(2)+'%')
                        : '—'}
                    </div>
                  </div>
                  <div>
                    <div className="plbl">ACTIVO</div>
                    <div style={{ fontSize:17, fontWeight:700 }}>{selAsset.icon} {selAsset.name}</div>
                  </div>
                  <div>
                    <div className="plbl">CATEGORÍA</div>
                    <div style={{ fontSize:11, color:'var(--tx2)', fontWeight:600, textTransform:'uppercase', letterSpacing:'.5px' }}>{selAsset.category}</div>
                  </div>
                  <div>
                    <div className="plbl">ÚLTIMA ACT.</div>
                    <div style={{ fontFamily:'JetBrains Mono', fontSize:12, color:'var(--tx2)' }}>
                      {lastUpdate?.toLocaleTimeString() ?? '--:--:--'}
                    </div>
                  </div>
                  <button className="ana-btn" style={{ padding:'10px 18px', fontSize:13 }}
                    onClick={() => { snd.click(); handleAnalyze(selAsset); }} onMouseEnter={snd.hover}>
                    🎤 Analizar con IA
                  </button>
                </div>
              </div>
            )}

            {/* API STATUS */}
            <ApiStatus st={apiStatus} newsStatus={newsStatus} />

            {/* TABS */}
            <div className="tab-bar" style={{ marginBottom:14 }}>
              {TABS.map(t => {
                const cnt = Object.values(data).filter(a => a?.category === t.id).length;
                return (
                  <button key={t.id} className={`tab-btn${tab === t.id ? ' act' : ''}`}
                    onClick={() => { snd.click(); setTab(t.id); }} onMouseEnter={snd.hover}>
                    {t.label}{cnt > 0 ? ` (${cnt})` : ''}
                  </button>
                );
              })}
            </div>

            {/* DOLLAR PANEL only when on forex tab */}
            {tab === 'forex' && <DollarPanel data={data} />}

            {/* TABLE */}
            <MarketTable assets={tabAssets} data={data} sel={sel}
              onSel={setSel} onAnalyze={handleAnalyze} snd={snd} />

            {/* FOOTER */}
            <div style={{ textAlign:'center', marginTop:36, padding:'18px 0', borderTop:'1px solid var(--b0)',
              fontSize:10, color:'var(--tx2)', fontFamily:'JetBrains Mono', lineHeight:2.2 }}>
              <div>
                <strong style={{ color:'var(--tx)' }}>APIs gratuitas sin API key:</strong>{' '}
                CoinGecko (crypto) · metals.live (spot metales) · Yahoo Finance/corsproxy (forex, energía, índices, agro)
                · alternative.me (fear &amp; greed) · rss2json + Reuters (noticias)
              </div>
              <div>Precios cada 22 seg · Noticias cada 5 min · Fear &amp; Greed cada hora</div>
              <div style={{ color:'var(--tx3)', marginTop:4 }}>
                ⚠ Tasas de referencia de mercado. No es asesoría de inversión.
                Los precios de forex pueden tener diferencia de spread respecto a tu broker.
              </div>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
