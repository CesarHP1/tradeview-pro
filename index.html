        const useASMRSounds = () => {
            const audioContext = useRef(null);

            useEffect(() => {
                audioContext.current = new (window.AudioContext || window.webkitAudioContext)();
            }, []);

            const playTone = (frequency, duration, type = 'sine', volume = 0.1) => {
                if (!audioContext.current) return;
                
                const oscillator = audioContext.current.createOscillator();
                const gainNode = audioContext.current.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.current.destination);
                
                oscillator.frequency.value = frequency;
                oscillator.type = type;
                
                gainNode.gain.setValueAtTime(volume, audioContext.current.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.current.currentTime + duration);
                
                oscillator.start(audioContext.current.currentTime);
                oscillator.stop(audioContext.current.currentTime + duration);
            };

            const playClick = () => {
                playTone(800, 0.1, 'sine', 0.15);
                setTimeout(() => playTone(1200, 0.08, 'sine', 0.1), 30);
            };

            const playHover = () => {
                playTone(600, 0.05, 'sine', 0.05);
            };

            const playSuccess = () => {
                playTone(523.25, 0.15, 'sine', 0.2);
                setTimeout(() => playTone(659.25, 0.15, 'sine', 0.2), 100);
                setTimeout(() => playTone(783.99, 0.2, 'sine', 0.2), 200);
            };

            const playAlert = () => {
                playTone(880, 0.2, 'sine', 0.15);
                setTimeout(() => playTone(1100, 0.3, 'sine', 0.15), 150);
            };

            return { playClick, playHover, playSuccess, playAlert };
        };

            const data = [];

            for (let i = 0; i < points; i++) {
                const change = (Math.random() - 0.48) * volatility;
                current += change;
                const open = current - change * 0.3;
                const close = current;
                const high = Math.max(open, close) + Math.random() * volatility * 0.3;
                const low = Math.min(open, close) - Math.random() * volatility * 0.3;
                
                data.push({
                    value: current,
                    time: Date.now() - (points - i) * 2000,
                    high, low, open, close,
                    volume: Math.random() * 1000 + 500
                });
            }
            return data;
        };

        // ==================== VOZ AI PROFESIONAL ====================
        const useVoiceAssistant = () => {
            const [isEnabled, setIsEnabled] = useState(false);
            const [currentVoice, setCurrentVoice] = useState(null);
            const [lastAnnouncement, setLastAnnouncement] = useState('');
            const synth = useRef(window.speechSynthesis);
            const voices = useRef([]);

            useEffect(() => {
                const loadVoices = () => {
                    voices.current = synth.current.getVoices();
                    const femaleVoice = voices.current.find(voice => 
                        voice.lang.includes('es') && 
                        (voice.name.includes('Female') || voice.name.includes('Femenina') || voice.name.includes('Google español') || voice.name.includes('Monica'))
                    ) || voices.current.find(voice => voice.lang.includes('es'));
                    
                    if (femaleVoice) {
                        setCurrentVoice(femaleVoice);
                    }
                };

                loadVoices();
                if (speechSynthesis.onvoiceschanged !== undefined) {
                    speechSynthesis.onvoiceschanged = loadVoices;
                }
            }, []);

            const speak = useCallback((text, priority = 'normal', rate = 0.9) => {
                if (!isEnabled || !currentVoice) return;

                if (priority === 'high') {
                    synth.current.cancel();
                }

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.voice = currentVoice;
                utterance.lang = 'es-ES';
                utterance.rate = rate;
                utterance.pitch = 1.0;
                utterance.volume = 0.85;

                synth.current.speak(utterance);
                setLastAnnouncement(text);
            }, [isEnabled, currentVoice]);

            const toggleVoice = () => {
                if (isEnabled) {
                    synth.current.cancel();
                }
                setIsEnabled(!isEnabled);
            };

            return { isEnabled, toggleVoice, speak, lastAnnouncement };
        };

                const ctx = canvas.getContext('2d');
                const dpr = window.devicePixelRatio || 1;
                canvas.width = width * dpr;
                canvas.height = height * dpr;
                ctx.scale(dpr, dpr);

                const values = data.map(d => d.close || d.value);
                const min = Math.min(...values);
                const max = Math.max(...values);
                const range = max - min || 1;

                ctx.clearRect(0, 0, width, height);

                const gradient = ctx.createLinearGradient(0, 0, 0, height);
                gradient.addColorStop(0, color + '40');
                gradient.addColorStop(1, color + '05');

                ctx.beginPath();
                ctx.moveTo(0, height);
                data.forEach((d, i) => {
                    const x = (i / (data.length - 1)) * width;
                    const y = height - ((d.close - min) / range) * (height - 4) - 2;
                    ctx.lineTo(x, y);
                });
                ctx.lineTo(width, height);
                ctx.closePath();
                ctx.fillStyle = gradient;
                ctx.fill();

                ctx.beginPath();
                data.forEach((d, i) => {
                    const x = (i / (data.length - 1)) * width;
                    const y = height - ((d.close - min) / range) * (height - 4) - 2;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                });
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                ctx.stroke();

                const lastY = height - ((data[data.length - 1].close - min) / range) * (height - 4) - 2;
                ctx.beginPath();
                ctx.arc(width, lastY, 3, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();
            }, [data, color, width, height]);

            return <canvas ref={canvasRef} width={width} height={height} style={{ width, height }} />;
        };

        // ==================== LARGE CHART PROFESIONAL COMPLETO ====================
        const LargeChart = ({ data, symbol, name, width, height }) => {
            const canvasRef = useRef(null);
            const [hoveredIndex, setHoveredIndex] = useState(null);
            const [mousePos, setMousePos] = useState({ x: 0, y: 0 });

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas || data.length < 2) return;
                const ctx = canvas.getContext('2d');
                const dpr = window.devicePixelRatio || 1;
                canvas.width = width * dpr;
                canvas.height = height * dpr;
                ctx.scale(dpr, dpr);

                const values = data.map(d => d.value || d.close);
                const highs = data.map(d => d.high);
                const lows = data.map(d => d.low);
                const min = Math.min(...lows) * 0.998;
                const max = Math.max(...highs) * 1.002;
                const range = max - min || 1;
                const padding = { top: 40, right: 70, bottom: 50, left: 10 };
                const chartW = width - padding.left - padding.right;
                const chartH = height - padding.top - padding.bottom;

                const isUp = data[data.length - 1].value >= data[0].value;
                const mainColor = isUp ? '#00d4aa' : '#ff4757';

                ctx.clearRect(0, 0, width, height);

                ctx.fillStyle = '#0d1117';
                ctx.beginPath();
                ctx.roundRect(0, 0, width, height, 12);
                ctx.fill();

                ctx.strokeStyle = '#1c2333';
                ctx.lineWidth = 0.5;
                const gridLines = 6;
                for (let i = 0; i <= gridLines; i++) {
                    const y = padding.top + (i / gridLines) * chartH;
                    ctx.beginPath();
                    ctx.moveTo(padding.left, y);
                    ctx.lineTo(width - padding.right, y);
                    ctx.stroke();

                    const price = max - (i / gridLines) * range;
                    ctx.fillStyle = '#5a6577';
                    ctx.font = '11px Inter';
                    ctx.textAlign = 'left';
                    ctx.fillText(price.toFixed(price > 100 ? 2 : 4), width - padding.right + 8, y + 4);
                }

                const maxVol = Math.max(...data.map(d => d.volume || 1000));
                data.forEach((d, i) => {
                    const x = padding.left + (i / (data.length - 1)) * chartW;
                    const vol = d.volume || 1000;
                    const barH = (vol / maxVol) * 30;
                    const barColor = d.close >= d.open ? 'rgba(0,212,170,0.2)' : 'rgba(255,71,87,0.2)';
                    ctx.fillStyle = barColor;
                    ctx.fillRect(x - 2, height - padding.bottom - barH, 4, barH);
                });

                const gradient = ctx.createLinearGradient(0, padding.top, 0, height - padding.bottom);
                gradient.addColorStop(0, mainColor + '30');
                gradient.addColorStop(0.5, mainColor + '10');
                gradient.addColorStop(1, mainColor + '00');

                ctx.beginPath();
                ctx.moveTo(padding.left, height - padding.bottom);
                data.forEach((d, i) => {
                    const x = padding.left + (i / (data.length - 1)) * chartW;
                    const y = padding.top + (1 - (d.value - min) / range) * chartH;
                    ctx.lineTo(x, y);
                });
                ctx.lineTo(padding.left + chartW, height - padding.bottom);
                ctx.closePath();
                ctx.fillStyle = gradient;
                ctx.fill();

                ctx.beginPath();
                data.forEach((d, i) => {
                    const x = padding.left + (i / (data.length - 1)) * chartW;
                    const y = padding.top + (1 - (d.value - min) / range) * chartH;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                });
                ctx.strokeStyle = mainColor;
                ctx.lineWidth = 2.5;
                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';
                ctx.stroke();

                ctx.strokeStyle = mainColor + '50';
                ctx.lineWidth = 6;
                ctx.beginPath();
                data.forEach((d, i) => {
                    const x = padding.left + (i / (data.length - 1)) * chartW;
                    const y = padding.top + (1 - (d.value - min) / range) * chartH;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                });
                ctx.stroke();

                const candleWidth = Math.max(2, chartW / data.length * 0.7);
                data.forEach((d, i) => {
                    const x = padding.left + (i / (data.length - 1)) * chartW;
                    const yOpen = padding.top + (1 - (d.open - min) / range) * chartH;
                    const yClose = padding.top + (1 - (d.close - min) / range) * chartH;
                    const yHigh = padding.top + (1 - (d.high - min) / range) * chartH;
                    const yLow = padding.top + (1 - (d.low - min) / range) * chartH;

                    const bullish = d.close >= d.open;
                    ctx.strokeStyle = bullish ? '#00d4aa' : '#ff4757';
                    ctx.lineWidth = 1;

                    ctx.beginPath();
                    ctx.moveTo(x, yHigh);
                    ctx.lineTo(x, yLow);
                    ctx.stroke();

                    ctx.fillStyle = bullish ? '#00d4aa' : '#ff4757';
                    const bodyTop = Math.min(yOpen, yClose);
                    const bodyHeight = Math.max(1, Math.abs(yClose - yOpen));
                    ctx.fillRect(x - candleWidth / 2, bodyTop, candleWidth, bodyHeight);
                });

                const lastValue = data[data.length - 1].value;
                const lastY = padding.top + (1 - (lastValue - min) / range) * chartH;
                ctx.setLineDash([5, 5]);
                ctx.strokeStyle = mainColor + '80';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(padding.left, lastY);
                ctx.lineTo(width - padding.right, lastY);
                ctx.stroke();
                ctx.setLineDash([]);

                ctx.fillStyle = mainColor;
                ctx.beginPath();
                ctx.roundRect(width - padding.right, lastY - 12, 65, 24, 4);
                ctx.fill();
                ctx.fillStyle = '#000';
                ctx.font = 'bold 11px Inter';
                ctx.textAlign = 'center';
                ctx.fillText(lastValue.toFixed(lastValue > 100 ? 2 : 4), width - padding.right + 32, lastY + 4);

                if (hoveredIndex !== null && hoveredIndex < data.length) {
                    const hx = padding.left + (hoveredIndex / (data.length - 1)) * chartW;
                    const hy = padding.top + (1 - (data[hoveredIndex].value - min) / range) * chartH;

                    ctx.setLineDash([4, 4]);
                    ctx.strokeStyle = '#4a5568';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(hx, padding.top);
                    ctx.lineTo(hx, height - padding.bottom);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(padding.left, hy);
                    ctx.lineTo(width - padding.right, hy);
                    ctx.stroke();
                    ctx.setLineDash([]);

                    ctx.beginPath();
                    ctx.arc(hx, hy, 6, 0, Math.PI * 2);
                    ctx.fillStyle = mainColor;
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(hx, hy, 10, 0, Math.PI * 2);
                    ctx.strokeStyle = mainColor + '60';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }

                ctx.fillStyle = '#e1e5eb';
                ctx.font = 'bold 15px Inter';
                ctx.textAlign = 'left';
                ctx.fillText(`${symbol}  ${name}`, padding.left + 15, 25);

                ctx.fillStyle = '#5a6577';
                ctx.font = '11px Inter';
                ctx.textAlign = 'center';
                const timeStep = Math.floor(data.length / 6);
                for (let i = 0; i < data.length; i += timeStep) {
                    const x = padding.left + (i / (data.length - 1)) * chartW;
                    const time = new Date(data[i].time);
                    ctx.fillText(time.toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' }), x, height - 10);
                }

            }, [data, symbol, name, width, height, hoveredIndex]);

            const handleMouseMove = (e) => {
                const rect = canvasRef.current.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const padding = { left: 10, right: 70 };
                const chartW = width - padding.left - padding.right;
                const index = Math.round(((x - padding.left) / chartW) * (data.length - 1));
                if (index >= 0 && index < data.length) {
                    setHoveredIndex(index);
                    setMousePos({ x: e.clientX - rect.left, y: e.clientY - rect.top });
                }
            };

            const currentPrice = data[data.length - 1]?.value || 0;
            const openPrice = data[0]?.value || 0;
            const change = currentPrice - openPrice;
            const changePercent = ((change / openPrice) * 100).toFixed(2);
            const isUp = change >= 0;

            return (
                <div style={{ position: 'relative' }}>
                    <canvas
                        ref={canvasRef}
                        width={width}
                        height={height}
                        style={{ width, height, cursor: 'crosshair', borderRadius: 12 }}
                        onMouseMove={handleMouseMove}
                        onMouseLeave={() => setHoveredIndex(null)}
                    />
                    {hoveredIndex !== null && data[hoveredIndex] && (
                        <div className="slide-in" style={{
                            position: 'absolute',
                            top: 50,
                            left: 15,
                            background: 'rgba(13,17,23,0.98)',
                            border: '1px solid #2d333b',
                            borderRadius: 10,
                            padding: '12px 16px',
                            fontSize: 12,
                            pointerEvents: 'none',
                            backdropFilter: 'blur(10px)',
                            minWidth: 220,
                            boxShadow: '0 8px 24px rgba(0,0,0,0.4)'
                        }}>
                            <div style={{ color: '#5a6577', marginBottom: 6, fontSize: 11, fontWeight: 600 }}>
                                {new Date(data[hoveredIndex].time).toLocaleString('es')}
                            </div>
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px 16px' }}>
                                <div><span style={{ color: '#5a6577' }}>Apertura: </span><span style={{ color: '#e1e5eb', fontWeight: 600 }}>{data[hoveredIndex].open.toFixed(2)}</span></div>
                                <div><span style={{ color: '#5a6577' }}>Cierre: </span><span style={{ color: '#e1e5eb', fontWeight: 600 }}>{data[hoveredIndex].close.toFixed(2)}</span></div>
                                <div><span style={{ color: '#5a6577' }}>Máximo: </span><span style={{ color: '#00d4aa', fontWeight: 600 }}>{data[hoveredIndex].high.toFixed(2)}</span></div>
                                <div><span style={{ color: '#5a6577' }}>Mínimo: </span><span style={{ color: '#ff4757', fontWeight: 600 }}>{data[hoveredIndex].low.toFixed(2)}</span></div>
                            </div>
                            <div style={{ marginTop: 8, paddingTop: 8, borderTop: '1px solid #2d333b' }}>
                                <span style={{ color: '#5a6577' }}>Volumen: </span><span style={{ color: '#667eea', fontWeight: 600 }}>{Math.round(data[hoveredIndex].volume || 0).toLocaleString()}</span>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ==================== MARKET TABLE ====================
        const MarketTable = ({ assets, allData, selectedAsset, onSelect, onAnalyze, playClick, playHover }) => {

        // ==================== MAIN APP ====================
        const App = () => {
            const [allData, setAllData] = useState({});
            const [selectedAsset, setSelectedAsset] = useState('sp500');
            const [activeTab, setActiveTab] = useState('todos');

            const containerRef = useRef(null);
            const lastNewsIndex = useRef(-1);

            useEffect(() => {

                    initialData[asset.id] = generateInitialHistory(asset.basePrice, asset.volatility, 100);

            }, []);

            useEffect(() => {
                const interval = setInterval(() => {
                    setAllData(prev => {
                        const newData = { ...prev };

                            if (newData[asset.id] && newData[asset.id].length > 0) {
                                const lastData = newData[asset.id][newData[asset.id].length - 1];

                                const newValue = lastData.value + change;

                                    value: newValue,
                                    time: Date.now(),
                                    open: lastData.value,
                                    close: newValue,
                                    high: Math.max(lastData.value, newValue) + Math.random() * asset.volatility * 0.3,
                                    low: Math.min(lastData.value, newValue) - Math.random() * asset.volatility * 0.3,
                                    volume: Math.random() * 1000 + 500
                                }];
                            }
                        });
                        return newData;
                    });
                }, 1500);

                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                if (!isEnabled) return;

                const interval = setInterval(() => {
                    const currentIndex = Math.floor(Math.random() * NEWS_DATA.length);
                    if (currentIndex !== lastNewsIndex.current) {
                        const news = NEWS_DATA[currentIndex];

                        playAlert();
                        lastNewsIndex.current = currentIndex;
                    }
                }, 60000);

                return () => clearInterval(interval);
            }, [isEnabled, speak, playAlert]);

            useEffect(() => {
                const handleResize = () => {
                    if (containerRef.current) {

                            height: window.innerWidth < 768 ? 350 : 480

                handleResize();
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);

            const handleAnalyze = (asset, isUp, changePercent, currentPrice) => {
                const trend = isUp ? 'alcista' : 'bajista';
                const strength = Math.abs(changePercent) > 2 ? 'fuerte' : Math.abs(changePercent) > 0.5 ? 'moderada' : 'débil';
                
                let analysis = '';
                let recommendation = '';
                let target = '';
                let stopLoss = '';
                let why = '';

                if (isUp && changePercent > 1) {
                    analysis = `Analizando ${asset.name} en detalle. Tendencia ${trend} ${strength} con ${changePercent.toFixed(2)}% positivo.`;
                    recommendation = 'Mi recomendación: COMPRA. El momentum está claramente a tu favor.';
                    target = `Objetivo de precio: ${(currentPrice * 1.05).toFixed(2)}.`;
                    stopLoss = `Stop loss recomendado: ${(currentPrice * 0.97).toFixed(2)}.`;
                    why = `¿Por qué comprar? Primero, la tendencia es claramente alcista con volumen creciente. Segundo, el precio rompió resistencia clave. Tercero, el momentum se acelera. Cuarto, indicadores técnicos confirman la fortaleza.`;
                } else if (!isUp && changePercent < -1) {
                    analysis = `Analizando ${asset.name} en detalle. Tendencia ${trend} ${strength} con ${Math.abs(changePercent).toFixed(2)}% negativo.`;
                    recommendation = 'Mi recomendación: ESPERA o VENDE si tienes posición. No es buen momento para entrar.';
                    target = `Soporte clave: ${(currentPrice * 0.95).toFixed(2)}.`;
                    stopLoss = `Resistencia: ${(currentPrice * 1.03).toFixed(2)}.`;
                    why = `¿Por qué esperar o vender? Primero, la tendencia bajista está confirmada. Segundo, el volumen de venta aumenta. Tercero, rompió soporte importante. Cuarto, no hay señales de reversión aún. Espera estabilización.`;
                } else {
                    analysis = `Analizando ${asset.name}. El mercado está lateral con movimiento del ${Math.abs(changePercent).toFixed(2)}%.`;
                    recommendation = 'Mi recomendación: MANTÉN tu posición actual o ESPERA confirmación.';
                    target = `Resistencia: ${(currentPrice * 1.02).toFixed(2)}. Soporte: ${(currentPrice * 0.98).toFixed(2)}.`;
                    stopLoss = '';
                    why = `¿Por qué esperar? El mercado está en consolidación sin dirección clara. Espera ruptura confirmada con volumen antes de operar. Paciencia es clave.`;
                }

                const fullAnalysis = `${analysis} ${recommendation} ${target} ${stopLoss} ${why}`;
                speak(fullAnalysis, 'high', 0.85);
                playSuccess();
            };

            const handleNewsClick = (news) => {
                playClick();
                const text = `${news.text}. Análisis detallado: ${news.analysis}. Recomendación: ${news.recommendation}. Razón principal: ${news.reason}.`;
                speak(text, 'high', 0.85);
                playSuccess();
            };

            const selectedAssetData = allData[selectedAsset];
            const selectedAssetInfo = Object.values(ASSETS).flat().find(a => a.id === selectedAsset);

            const tabs = [
                { id: 'todos', label: '🌐 Todos', assets: Object.values(ASSETS).flat() },
                { id: 'energia', label: '⚡ Energía', assets: ASSETS.energia },
                { id: 'metales', label: '🥇 Metales', assets: ASSETS.metales },
                { id: 'forex', label: '💱 Forex', assets: ASSETS.forex },
                { id: 'crypto', label: '₿ Crypto', assets: ASSETS.crypto },
                { id: 'bolsa', label: '📊 Bolsa', assets: ASSETS.bolsa },
                { id: 'acciones', label: '🏢 Acciones', assets: ASSETS.acciones },
                { id: 'commodities', label: '🌾 Commodities', assets: ASSETS.commodities },
                { id: 'bienesraices', label: '🏠 Bienes Raíces', assets: ASSETS.bienesRaices },
            ];

            const currentTab = tabs.find(t => t.id === activeTab) || tabs[0];

            return (
                <div style={{ minHeight: '100vh', background: 'linear-gradient(135deg, #0a0e17 0%, #1a1f2e 100%)' }}>
                    <header style={{
                        background: 'linear-gradient(180deg, #0d1117, #0a0e17)',
                        borderBottom: '2px solid #21262d',
                        padding: '16px 24px',
                        display: 'flex',
                        justifyContent: 'space-between',
                        alignItems: 'center',
                        flexWrap: 'wrap',
                        gap: 16,
                        boxShadow: '0 4px 24px rgba(0,0,0,0.3)'
                    }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
                            <div style={{
                                width: 42, height: 42, borderRadius: 12,
                                background: 'linear-gradient(135deg, #667eea, #764ba2)',
                                display: 'flex', alignItems: 'center', justifyContent: 'center',
                                fontSize: 22, fontWeight: 900,
                                boxShadow: '0 4px 12px rgba(102,126,234,0.4)'
                            }}>T</div>
                            <div>
                                <h1 style={{ fontSize: 20, fontWeight: 800, letterSpacing: -0.5 }}>
                                    TradeView <span style={{ color: '#667eea' }}>Pro AI</span>
                                </h1>
                                <div style={{ fontSize: 11, color: '#5a6577', fontWeight: 600 }}>
                                    Dashboard Profesional con Voz y ASMR
                                </div>
                            </div>
                        </div>

                        <div style={{ display: 'flex', alignItems: 'center', gap: 20 }}>
                            {lastAnnouncement && (
                                <div style={{
                                    padding: '10px 18px',
                                    background: 'rgba(102,126,234,0.15)',
                                    border: '1px solid #667eea',
                                    borderRadius: 10,
                                    fontSize: 12,
                                    maxWidth: 450,
                                    overflow: 'hidden',
                                    textOverflow: 'ellipsis',
                                    fontWeight: 500
                                }}>
                                    🔊 {lastAnnouncement}
                                </div>
                            )}
                            <button 
                                onClick={() => { playClick(); toggleVoice(); }}
                                className={`voice-btn ${isEnabled ? 'active' : ''}`}
                                onMouseEnter={playHover}
                            >
                                <span style={{ fontSize: 20 }}>{isEnabled ? '🔊' : '🔇'}</span>
                                <span>{isEnabled ? 'Voz Activada' : 'Activar Voz AI'}</span>
                            </button>
                        </div>
                    </header>

                    <NewsTicker news={NEWS_DATA} onNewsSpeak={handleNewsClick} playHover={playHover} />

                    <div ref={containerRef} style={{ maxWidth: 1400, margin: '0 auto', padding: '20px 20px 50px' }}>
                        {selectedAssetData && selectedAssetInfo && (
                            <div className="slide-in" style={{ marginBottom: 24 }}>
                                <LargeChart
                                    data={selectedAssetData}
                                    symbol={selectedAssetInfo.symbol}
                                    name={selectedAssetInfo.name}
                                    width={chartSize.width}
                                    height={chartSize.height}
                                />
                            </div>
                        )}

                        <div style={{ 
                            display: 'flex', 
                            gap: 10, 
                            marginBottom: 24, 
                            overflowX: 'auto',
                            paddingBottom: 8,
                            scrollbarWidth: 'thin',
                            scrollbarColor: '#667eea #161b22'
                        }}>
                            {tabs.map(tab => (
                                <button 
                                    key={tab.id} 
                                    className={`tab-btn ${activeTab === tab.id ? 'active' : ''}`}
                                    onClick={() => { playClick(); setActiveTab(tab.id); }}
                                    onMouseEnter={playHover}
                                >
                                    <span>{tab.label}</span>
                                </button>
                            ))}
                        </div>

                        <MarketTable
                            assets={currentTab.assets}
                            allData={allData}
                            selectedAsset={selectedAsset}
                            onSelect={setSelectedAsset}
                            onAnalyze={handleAnalyze}
                            playClick={playClick}
                            playHover={playHover}
                        />

                        <div style={{
                            textAlign: 'center',
                            padding: '40px 20px 20px',
                            borderTop: '2px solid #21262d',
                            marginTop: 40,
                            background: 'linear-gradient(180deg, transparent, rgba(102,126,234,0.05))'
                        }}>
                            <div style={{ color: '#5a6577', fontSize: 13, marginBottom: 8 }}>
                                🎤 TradeView Pro AI • Análisis de Voz Inteligente • Sonidos ASMR
                            </div>
                            <div style={{ color: '#30363d', fontSize: 11 }}>
                                Datos en tiempo real • Gráficas profesionales • Recomendaciones detalladas
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
