    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e17;
            color: #e1e5eb;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb { background: #2d333b; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #444c56; }
        @keyframes pulse-green {
            0%, 100% { color: #00d4aa; }
            50% { color: #00ffcc; }
        }
        @keyframes pulse-red {
            0%, 100% { color: #ff4757; }
            50% { color: #ff6b7a; }
        }
        @keyframes flash-green {
            0% { background: rgba(0, 212, 170, 0.3); }
            100% { background: transparent; }
        }
        @keyframes flash-red {
            0% { background: rgba(255, 71, 87, 0.3); }
            100% { background: transparent; }
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .flash-up { animation: flash-green 0.5s ease-out; }
        .flash-down { animation: flash-red 0.5s ease-out; }
        .slide-in { animation: slideIn 0.3s ease-out; }
        .ticker-animation { animation: ticker 60s linear infinite; }
        .voice-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .voice-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.4);
        }
        .voice-btn.active {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            animation: pulse-voice 1.5s infinite;
        }
        @keyframes pulse-voice {
            0%, 100% { box-shadow: 0 0 0 0 rgba(245, 87, 108, 0.7); }
            50% { box-shadow: 0 0 0 10px rgba(245, 87, 108, 0); }
        }
    </style>
</head>

        const generateInitialHistory = (base, volatility, points = 60) => {
            const data = [];
            let current = base;
            for (let i = 0; i < points; i++) {
                const change = (Math.random() - 0.48) * volatility;
                current += change;
                data.push({
                    value: current,
                    time: Date.now() - (points - i) * 2000,
                    high: current + Math.random() * volatility * 0.5,
                    low: current - Math.random() * volatility * 0.5,
                    open: current - change * 0.3,
                    close: current
                });
            }
            return data;
        };

        // ==================== VOZ AI ====================
        const useVoiceAssistant = () => {
            const [isEnabled, setIsEnabled] = useState(false);
            const [currentVoice, setCurrentVoice] = useState(null);
            const [lastAnnouncement, setLastAnnouncement] = useState('');
            const synth = useRef(window.speechSynthesis);
            const voices = useRef([]);

            useEffect(() => {
                const loadVoices = () => {
                    voices.current = synth.current.getVoices();
                    // Buscar voz femenina en español
                    const femaleVoice = voices.current.find(voice => 
                        voice.lang.includes('es') && 
                        (voice.name.includes('Female') || voice.name.includes('Femenina') || voice.name.includes('Google español'))
                    ) || voices.current.find(voice => voice.lang.includes('es'));
                    
                    if (femaleVoice) {
                        setCurrentVoice(femaleVoice);
                    }
                };

                loadVoices();
                if (speechSynthesis.onvoiceschanged !== undefined) {
                    speechSynthesis.onvoiceschanged = loadVoices;
                }
            }, []);

            const speak = useCallback((text, priority = 'normal') => {
                if (!isEnabled || !currentVoice) return;

                // Cancelar habla anterior si es alta prioridad
                if (priority === 'high') {
                    synth.current.cancel();
                }

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.voice = currentVoice;
                utterance.lang = 'es-ES';
                utterance.rate = 0.95; // Un poco más lento para ASMR
                utterance.pitch = 1.0; // Tono natural
                utterance.volume = 0.8;

                synth.current.speak(utterance);
                setLastAnnouncement(text);
            }, [isEnabled, currentVoice]);

            const toggleVoice = () => {
                if (isEnabled) {
                    synth.current.cancel();
                }
                setIsEnabled(!isEnabled);
            };

            return { isEnabled, toggleVoice, speak, lastAnnouncement };
        };

        // ==================== MINI CHART ====================
        const MiniChart = ({ data, color, width = 120, height = 40 }) => {
            const canvasRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas || data.length < 2) return;
                const ctx = canvas.getContext('2d');
                const dpr = window.devicePixelRatio || 1;
                canvas.width = width * dpr;
                canvas.height = height * dpr;
                ctx.scale(dpr, dpr);

                const values = data.map(d => d.value);
                const min = Math.min(...values);
                const max = Math.max(...values);
                const range = max - min || 1;

                ctx.clearRect(0, 0, width, height);

                const gradient = ctx.createLinearGradient(0, 0, 0, height);
                gradient.addColorStop(0, color + '30');
                gradient.addColorStop(1, color + '05');

                ctx.beginPath();
                ctx.moveTo(0, height);
                data.forEach((d, i) => {
                    const x = (i / (data.length - 1)) * width;
                    const y = height - ((d.value - min) / range) * (height - 4) - 2;
                    ctx.lineTo(x, y);
                });
                ctx.lineTo(width, height);
                ctx.closePath();
                ctx.fillStyle = gradient;
                ctx.fill();

                ctx.beginPath();
                data.forEach((d, i) => {
                    const x = (i / (data.length - 1)) * width;
                    const y = height - ((d.value - min) / range) * (height - 4) - 2;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                });
                ctx.strokeStyle = color;
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }, [data, color, width, height]);

            return <canvas ref={canvasRef} width={width} height={height} style={{ width, height }} />;
        };

        // ==================== LARGE CHART ====================
        const LargeChart = ({ data, symbol, name, width, height }) => {
            const canvasRef = useRef(null);
            const [hoveredIndex, setHoveredIndex] = useState(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas || data.length < 2) return;
                const ctx = canvas.getContext('2d');
                const dpr = window.devicePixelRatio || 1;
                canvas.width = width * dpr;
                canvas.height = height * dpr;
                ctx.scale(dpr, dpr);

                const values = data.map(d => d.value);
                const highs = data.map(d => d.high);
                const lows = data.map(d => d.low);
                const min = Math.min(...lows) * 0.999;
                const max = Math.max(...highs) * 1.001;
                const range = max - min || 1;
                const padding = { top: 30, right: 60, bottom: 40, left: 10 };
                const chartW = width - padding.left - padding.right;
                const chartH = height - padding.top - padding.bottom;

                const isUp = data[data.length - 1].value >= data[0].value;
                const mainColor = isUp ? '#00d4aa' : '#ff4757';

                ctx.clearRect(0, 0, width, height);

                ctx.fillStyle = '#0d1117';
                ctx.beginPath();
                ctx.roundRect(0, 0, width, height, 8);
                ctx.fill();

                ctx.strokeStyle = '#1c2333';
                ctx.lineWidth = 0.5;
                const gridLines = 5;
                for (let i = 0; i <= gridLines; i++) {
                    const y = padding.top + (i / gridLines) * chartH;
                    ctx.beginPath();
                    ctx.moveTo(padding.left, y);
                    ctx.lineTo(width - padding.right, y);
                    ctx.stroke();

                    const price = max - (i / gridLines) * range;
                    ctx.fillStyle = '#5a6577';
                    ctx.font = '11px Inter';
                    ctx.textAlign = 'left';
                    ctx.fillText(price.toFixed(price > 100 ? 2 : 4), width - padding.right + 5, y + 4);
                }

                const gradient = ctx.createLinearGradient(0, padding.top, 0, height - padding.bottom);
                gradient.addColorStop(0, mainColor + '25');
                gradient.addColorStop(0.5, mainColor + '08');
                gradient.addColorStop(1, mainColor + '00');

                ctx.beginPath();
                ctx.moveTo(padding.left, height - padding.bottom);
                data.forEach((d, i) => {
                    const x = padding.left + (i / (data.length - 1)) * chartW;
                    const y = padding.top + (1 - (d.value - min) / range) * chartH;
                    ctx.lineTo(x, y);
                });
                ctx.lineTo(padding.left + chartW, height - padding.bottom);
                ctx.closePath();
                ctx.fillStyle = gradient;
                ctx.fill();

                ctx.beginPath();
                data.forEach((d, i) => {
                    const x = padding.left + (i / (data.length - 1)) * chartW;
                    const y = padding.top + (1 - (d.value - min) / range) * chartH;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                });
                ctx.strokeStyle = mainColor;
                ctx.lineWidth = 2;
                ctx.stroke();

            }, [data, symbol, name, width, height]);

            const isUp = data.length >= 2 && data[data.length - 1].value >= data[0].value;

            return (
                <div style={{ position: 'relative' }}>
                    <canvas
                        ref={canvasRef}
                        width={width}
                        height={height}
                        style={{ width, height, borderRadius: 8 }}
                    />

        };

                                onMouseEnter={e => {

                                    e.currentTarget.style.background = 'rgba(102,126,234,0.2)';
                                }}
                                onMouseLeave={e => {

            );
        };

        // ==================== MARKET TABLE ====================
        const MarketTable = ({ assets, allData, selectedAsset, onSelect, onAnalyze }) => {
            const [flashStates, setFlashStates] = useState({});

            useEffect(() => {
                const newFlashes = {};
                assets.forEach(asset => {
                    const data = allData[asset.id];
                    if (data && data.length >= 2) {
                        const current = data[data.length - 1].value;
                        const prev = data[data.length - 2].value;
                        if (current !== prev) {
                            newFlashes[asset.id] = current > prev ? 'up' : 'down';
                        }
                    }
                });
                if (Object.keys(newFlashes).length > 0) {
                    setFlashStates(prev => ({ ...prev, ...newFlashes }));
                    setTimeout(() => setFlashStates({}), 600);
                }
            }, [allData]);

            return (
                <div style={{
                    background: '#0d1117',
                    borderRadius: 12,
                    border: '1px solid #21262d',
                    overflow: 'hidden'
                }}>
                    <div style={{
                        display: 'grid',
                        gridTemplateColumns: '2fr 1.2fr 1fr 1fr 100px 120px',
                        padding: '10px 16px',
                        background: '#161b22',
                        borderBottom: '1px solid #21262d',
                        fontSize: 11,
                        color: '#5a6577',
                        fontWeight: 600
                    }}>
                        <span>Activo</span>
                        <span style={{ textAlign: 'right' }}>Precio</span>
                        <span style={{ textAlign: 'right' }}>Cambio</span>
                        <span style={{ textAlign: 'right' }}>Cambio %</span>
                        <span style={{ textAlign: 'center' }}>Tendencia</span>
                        <span style={{ textAlign: 'center' }}>Acción</span>
                    </div>
                    {assets.map(asset => {
                        const data = allData[asset.id];
                        if (!data || data.length < 2) return null;
                        const current = data[data.length - 1].value;
                        const open = data[0].value;
                        const change = current - open;
                        const changePercent = ((change / open) * 100);
                        const isUp = change >= 0;
                        const flash = flashStates[asset.id];

                        return (
                            <div key={asset.id}
                                className={`slide-in ${flash === 'up' ? 'flash-up' : flash === 'down' ? 'flash-down' : ''}`}
                                onClick={() => onSelect(asset.id)}

                                    alignItems: 'center'

                                    <span style={{ fontSize: 20 }}>{asset.icon}</span>
                                    <div>
                                        <div style={{ fontWeight: 600, fontSize: 13 }}>{asset.symbol}</div>
                                        <div style={{ fontSize: 11, color: '#5a6577' }}>{asset.name}</div>
                                    </div>
                                </div>
                                <div style={{ textAlign: 'right', fontWeight: 700, fontFamily: 'monospace' }}>
                                    {current.toFixed(current > 100 ? 2 : 4)}
                                </div>
                                <div style={{ textAlign: 'right', fontWeight: 600, color: isUp ? '#00d4aa' : '#ff4757' }}>
                                    {isUp ? '+' : ''}{change.toFixed(2)}
                                </div>
                                <div style={{ textAlign: 'right', fontWeight: 600, color: isUp ? '#00d4aa' : '#ff4757' }}>
                                    {isUp ? '+' : ''}{changePercent.toFixed(2)}%
                                </div>
                                <div style={{ display: 'flex', justifyContent: 'center' }}>
                                    <MiniChart data={data.slice(-20)} color={isUp ? '#00d4aa' : '#ff4757'} width={90} height={32} />
                                </div>
                                <div style={{ display: 'flex', justifyContent: 'center' }}>
                                    <button
                                        onClick={(e) => {
                                            e.stopPropagation();
                                            onAnalyze(asset, isUp, changePercent);
                                        }}

                                            padding: '6px 12px',
                                            borderRadius: 6,
                                            border: 'none',
                                            background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                                            color: 'white',
                                            fontSize: 11,
                                            fontWeight: 600,
                                            cursor: 'pointer',
                                            transition: 'all 0.2s'

                                        onMouseEnter={e => e.target.style.transform = 'scale(1.05)'}
                                        onMouseLeave={e => e.target.style.transform = 'scale(1)'}
                                    >
                                        🎤 Analizar
                                    </button>
                                </div>
                            </div>
                        );
                    })}
                </div>
            );

        // ==================== MAIN APP ====================
        const App = () => {
            const [allData, setAllData] = useState({});
            const [selectedAsset, setSelectedAsset] = useState('sp500');
            const [activeTab, setActiveTab] = useState('todos');
            const [chartSize, setChartSize] = useState({ width: 800, height: 400 });
            const { isEnabled, toggleVoice, speak, lastAnnouncement } = useVoiceAssistant();
            const containerRef = useRef(null);
            const lastNewsIndex = useRef(-1);

            // Initialize data
            useEffect(() => {
                const initialData = {};
                Object.values(ASSETS).flat().forEach(asset => {
                    initialData[asset.id] = generateInitialHistory(asset.basePrice, asset.volatility, 60);
                });
                setAllData(initialData);
            }, []);

            // Real-time updates
            useEffect(() => {
                const interval = setInterval(() => {
                    setAllData(prev => {
                        const newData = { ...prev };
                        Object.values(ASSETS).flat().forEach(asset => {
                            if (newData[asset.id] && newData[asset.id].length > 0) {
                                const lastData = newData[asset.id][newData[asset.id].length - 1];
                                const change = (Math.random() - 0.48) * asset.volatility;
                                const newValue = lastData.value + change;
                                newData[asset.id] = [...newData[asset.id].slice(-120), {
                                    value: newValue,
                                    time: Date.now(),
                                    open: lastData.value,
                                    close: newValue,
                                    high: Math.max(lastData.value, newValue) + Math.random() * asset.volatility * 0.2,
                                    low: Math.min(lastData.value, newValue) - Math.random() * asset.volatility * 0.2
                                }];
                            }
                        });
                        return newData;
                    });
                }, 1500);

                return () => clearInterval(interval);
            }, []);

            // Anunciar noticias automáticamente
            useEffect(() => {
                if (!isEnabled) return;

                const interval = setInterval(() => {
                    const currentIndex = Math.floor(Math.random() * NEWS_DATA.length);
                    if (currentIndex !== lastNewsIndex.current) {
                        const news = NEWS_DATA[currentIndex];
                        const actionText = news.impact === 'positive' ? 'Es un buen momento para comprar' :
                                         news.impact === 'negative' ? 'Te recomiendo esperar o vender' :
                                         'Mantén tu posición y observa';
                        
                        speak(`${news.text}. ${actionText}`, 'normal');
                        lastNewsIndex.current = currentIndex;
                    }
                }, 45000); // Cada 45 segundos

                return () => clearInterval(interval);
            }, [isEnabled, speak]);

            // Resize handler
            useEffect(() => {
                const handleResize = () => {
                    if (containerRef.current) {
                        const width = containerRef.current.offsetWidth;
                        setChartSize({
                            width: Math.min(width - 32, 1200),
                            height: window.innerWidth < 768 ? 300 : 420
                        });
                    }
                };
                handleResize();
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            const handleAnalyze = (asset, isUp, changePercent) => {
                const recommendations = {
                    buy: `Analizando ${asset.name}. La tendencia es alcista con ${changePercent.toFixed(2)}% positivo. Mi recomendación: Compra ahora, el momentum está a tu favor. Objetivo de precio: ${(asset.basePrice * 1.05).toFixed(2)}.`,
                    sell: `Analizando ${asset.name}. La tendencia es bajista con ${Math.abs(changePercent).toFixed(2)}% negativo. Mi recomendación: Espera una mejor entrada o considera vender si tienes posición. Soporte en: ${(asset.basePrice * 0.95).toFixed(2)}.`,
                    hold: `Analizando ${asset.name}. El mercado está lateral. Mi recomendación: Mantén tu posición actual. Espera confirmación de ruptura antes de operar.`
                };

                let rec = recommendations.hold;
                if (changePercent > 1) rec = recommendations.buy;
                else if (changePercent < -1) rec = recommendations.sell;

                speak(rec, 'high');
            };

            const handleNewsClick = (news) => {
                const actionText = news.impact === 'positive' ? 'Aprovecha esta oportunidad de compra' :
                                 news.impact === 'negative' ? 'Ten cuidado, es mejor esperar' :
                                 'Observa el comportamiento antes de actuar';
                speak(`${news.text}. ${actionText}`, 'high');
            };

            const selectedAssetData = allData[selectedAsset];
            const selectedAssetInfo = Object.values(ASSETS).flat().find(a => a.id === selectedAsset);

            const tabs = [
                { id: 'todos', label: '🌐 Todos', assets: Object.values(ASSETS).flat() },
                { id: 'energia', label: '⚡ Energía', assets: ASSETS.energia },
                { id: 'metales', label: '🥇 Metales', assets: ASSETS.metales },
                { id: 'forex', label: '💱 Forex', assets: ASSETS.forex },
                { id: 'crypto', label: '₿ Crypto', assets: ASSETS.crypto },
                { id: 'bolsa', label: '📊 Bolsa', assets: ASSETS.bolsa },
                { id: 'acciones', label: '🏢 Acciones', assets: ASSETS.acciones },
            ];

            const currentTab = tabs.find(t => t.id === activeTab);

            return (
                <div style={{ minHeight: '100vh', background: '#0a0e17' }}>
                    {/* Header */}
                    <header style={{
                        background: 'linear-gradient(180deg, #0d1117, #0a0e17)',
                        borderBottom: '1px solid #21262d',
                        padding: '12px 24px',
                        display: 'flex',
                        justifyContent: 'space-between',
                        alignItems: 'center',
                        flexWrap: 'wrap',
                        gap: 12
                    }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                            <div style={{
                                width: 36, height: 36, borderRadius: 10,
                                background: 'linear-gradient(135deg, #667eea, #764ba2)',
                                display: 'flex', alignItems: 'center', justifyContent: 'center',
                                fontSize: 18, fontWeight: 900
                            }}>T</div>
                            <div>
                                <h1 style={{ fontSize: 18, fontWeight: 800 }}>
                                    TradeView <span style={{ color: '#667eea' }}>Pro AI</span>
                                </h1>
                                <div style={{ fontSize: 11, color: '#5a6577' }}>
                                    Asistente de Voz Inteligente
                                </div>
                            </div>
                        </div>

                        <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
                            {lastAnnouncement && (
                                <div style={{
                                    padding: '8px 16px',
                                    background: 'rgba(102,126,234,0.1)',
                                    border: '1px solid #667eea',
                                    borderRadius: 8,
                                    fontSize: 12,
                                    maxWidth: 400,
                                    overflow: 'hidden',
                                    textOverflow: 'ellipsis'
                                }}>
                                    🔊 {lastAnnouncement}
                                </div>
                            )}
                            <button 
                                onClick={toggleVoice}
                                className={`voice-btn ${isEnabled ? 'active' : ''}`}
                            >
                                <span style={{ fontSize: 18 }}>{isEnabled ? '🔊' : '🔇'}</span>
                                <span>{isEnabled ? 'Voz Activada' : 'Activar Voz'}</span>
                            </button>
                        </div>
                    </header>

                    {/* News Ticker */}
                    <NewsTicker news={NEWS_DATA} onNewsSpeak={handleNewsClick} />

                    <div ref={containerRef} style={{ maxWidth: 1400, margin: '0 auto', padding: '16px 16px 40px' }}>
                        {/* Main Chart */}
                        {selectedAssetData && selectedAssetInfo && (
                            <div className="slide-in" style={{ marginBottom: 20 }}>
                                <LargeChart
                                    data={selectedAssetData}
                                    symbol={selectedAssetInfo.symbol}
                                    name={selectedAssetInfo.name}
                                    width={chartSize.width}
                                    height={chartSize.height}
                                />
                            </div>
                        )}

                        {/* Tabs */}
                        <div style={{ display: 'flex', gap: 6, marginBottom: 16, overflowX: 'auto' }}>
                            {tabs.map(tab => (
                                <button key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    style={{
                                        padding: '8px 16px',
                                        borderRadius: 8,
                                        border: activeTab === tab.id ? '1px solid #667eea' : '1px solid #21262d',
                                        background: activeTab === tab.id ? 'rgba(102,126,234,0.1)' : '#161b22',
                                        color: activeTab === tab.id ? '#667eea' : '#8b949e',
                                        cursor: 'pointer',
                                        fontSize: 12,
                                        fontWeight: 600,
                                        whiteSpace: 'nowrap'
                                    }}
                                >
                                    {tab.label}
                                </button>
                            ))}
                        </div>

                        {/* Market Table */}
                        <MarketTable
                            assets={currentTab.assets}
                            allData={allData}
                            selectedAsset={selectedAsset}
                            onSelect={setSelectedAsset}
                            onAnalyze={handleAnalyze}
                        />

                        {/* Footer */}
                        <div style={{
                            textAlign: 'center',
                            padding: '30px 0 10px',
                            borderTop: '1px solid #21262d',
                            marginTop: 30,
                            color: '#5a6577',
                            fontSize: 12
                        }}>
                            🎤 TradeView Pro AI con Asistente de Voz • Datos en tiempo real
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
