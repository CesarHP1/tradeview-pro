<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradeView Pro AI</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg0:#05080f;--bg1:#090d18;--bg2:#0e1422;--bg3:#131a2a;
      --b0:#1a2640;--b1:#243350;
      --acc:#3b82f6;--acc2:#6366f1;
      --green:#22d3a5;--red:#f43f5e;--amber:#f59e0b;
      --tx:#dde6f0;--tx2:#64748b;--tx3:#1e2d45;
    }
    body { font-family:'Syne',sans-serif;background:var(--bg0);color:var(--tx);min-height:100vh;overflow-x:hidden; }
    ::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg0)}::-webkit-scrollbar-thumb{background:var(--b0);border-radius:3px}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
    @keyframes tick-run{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
    @keyframes flash-g{0%{background:rgba(34,211,165,.22)}100%{background:transparent}}
    @keyframes flash-r{0%{background:rgba(244,63,94,.22)}100%{background:transparent}}
    @keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .flash-up{animation:flash-g .55s ease-out}.flash-down{animation:flash-r .55s ease-out}
    .fadein{animation:fadein .35s ease-out both}
    .spinner{width:32px;height:32px;border:3px solid var(--b0);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
    .hdr{background:var(--bg1);border-bottom:1px solid var(--b0);padding:12px 24px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:200;backdrop-filter:blur(14px)}
    .logo{display:flex;align-items:center;gap:12px}
    .logo-badge{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-weight:900;font-size:17px;color:#fff;box-shadow:0 0 18px rgba(59,130,246,.4)}
    .logo h1{font-size:17px;font-weight:800;letter-spacing:-.4px}.logo h1 span{color:var(--acc)}
    .logo p{font-size:10px;color:var(--tx2);font-family:'JetBrains Mono',monospace}
    .live-badge{display:flex;align-items:center;gap:7px;padding:5px 12px;background:rgba(34,211,165,.07);border:1px solid rgba(34,211,165,.28);border-radius:7px;font-size:10px;font-weight:700;color:var(--green);font-family:'JetBrains Mono',monospace}
    .live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse-dot 1.4s ease-in-out infinite}
    .vbtn{display:flex;align-items:center;gap:7px;padding:7px 16px;border:1px solid var(--b1);background:var(--bg2);color:var(--tx);border-radius:7px;cursor:pointer;font-size:12px;font-weight:700;font-family:'Syne',sans-serif;transition:all .2s}
    .vbtn:hover{border-color:var(--acc);background:rgba(59,130,246,.08)}.vbtn.on{border-color:var(--red);background:rgba(244,63,94,.1);color:var(--red)}
    .stats-bar{background:var(--bg1);border-bottom:1px solid var(--b0);padding:7px 24px;display:flex;gap:20px;overflow-x:auto;align-items:center;font-size:11px;font-family:'JetBrains Mono',monospace;white-space:nowrap}
    .stat-pill{display:flex;align-items:center;gap:6px}.stat-pill .lbl{color:var(--tx2)}.stat-pill .val{color:var(--tx);font-weight:700}
    .fg-box{display:flex;align-items:center;gap:8px;padding:4px 12px;border-radius:7px;border:1px solid;font-size:10px;font-weight:800;font-family:'JetBrains Mono',monospace}
    .ticker-wrap{background:var(--bg1);border-bottom:1px solid var(--b0);height:46px;display:flex;align-items:center;overflow:hidden;position:relative}
    .ticker-lbl{position:absolute;left:0;top:0;bottom:0;z-index:10;background:linear-gradient(135deg,var(--acc),var(--acc2));padding:0 18px;display:flex;align-items:center;font-size:10px;font-weight:900;letter-spacing:1.5px;white-space:nowrap}
    .ticker-fade{position:absolute;left:110px;top:0;bottom:0;width:36px;z-index:5;background:linear-gradient(to right,var(--bg1),transparent)}
    .ticker-track{display:flex;gap:40px;padding-left:130px;white-space:nowrap}
    .tick-item{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:600;cursor:pointer;padding:4px 12px;border-radius:6px;border:1px solid;transition:transform .18s}
    .tick-item:hover{transform:scale(1.04)}
    .tick-item.pos{border-color:rgba(34,211,165,.3);background:rgba(34,211,165,.07);color:var(--green)}
    .tick-item.neg{border-color:rgba(244,63,94,.3);background:rgba(244,63,94,.07);color:var(--red)}
    .tick-item.neu{border-color:var(--b0);background:var(--bg2);color:var(--tx2)}
    .tick-tag{font-size:9px;font-weight:800;padding:2px 7px;border-radius:4px;font-family:'JetBrains Mono',monospace}
    .tick-tag.pos{background:var(--green);color:#000}.tick-tag.neg{background:var(--red);color:#fff}.tick-tag.neu{background:var(--tx2);color:#000}
    .tab-bar{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px}
    .tab-btn{padding:8px 18px;border:1px solid var(--b0);background:var(--bg2);color:var(--tx2);border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;font-family:'Syne',sans-serif;white-space:nowrap;transition:all .18s}
    .tab-btn:hover{border-color:var(--b1);color:var(--tx)}.tab-btn.active{border-color:var(--acc);background:rgba(59,130,246,.1);color:var(--acc)}
    .tbl{background:var(--bg2);border:1px solid var(--b0);border-radius:12px;overflow:hidden}
    .tbl-head{display:grid;grid-template-columns:2fr 1.4fr 1fr 100px 130px;padding:9px 20px;background:var(--bg1);border-bottom:1px solid var(--b0);font-size:9px;font-weight:700;letter-spacing:1px;color:var(--tx2);text-transform:uppercase;font-family:'JetBrains Mono',monospace}
    .tbl-row{display:grid;grid-template-columns:2fr 1.4fr 1fr 100px 130px;padding:12px 20px;border-bottom:1px solid var(--b0);cursor:pointer;border-left:3px solid transparent;align-items:center;transition:background .14s,border-left-color .14s}
    .tbl-row:last-child{border-bottom:none}.tbl-row:hover{background:var(--bg3)}.tbl-row.sel{background:rgba(59,130,246,.06);border-left-color:var(--acc)}
    .price-bar{background:var(--bg2);border:1px solid var(--b0);border-radius:10px;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:18px}
    .price-main{font-family:'JetBrains Mono',monospace;font-size:30px;font-weight:700}
    .price-chg{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700}
    .price-lbl{font-size:10px;color:var(--tx2);margin-bottom:3px;letter-spacing:.5px}
    .ana-btn{padding:7px 14px;border:1px solid var(--acc2);background:rgba(99,102,241,.1);color:var(--acc2);border-radius:7px;cursor:pointer;font-size:11px;font-weight:700;font-family:'Syne',sans-serif;transition:all .2s}
    .ana-btn:hover{background:var(--acc2);color:#fff;transform:translateY(-1px);box-shadow:0 4px 14px rgba(99,102,241,.4)}
    .api-pill{display:inline-flex;align-items:center;gap:5px;font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--tx2);padding:3px 8px;background:var(--bg1);border:1px solid var(--b0);border-radius:5px}
    .api-dot{width:5px;height:5px;border-radius:50%}
    .ctt{position:absolute;background:var(--bg1);border:1px solid var(--b1);border-radius:8px;padding:10px 14px;font-size:11px;font-family:'JetBrains Mono',monospace;pointer-events:none;z-index:50;min-width:155px;box-shadow:0 8px 24px rgba(0,0,0,.5)}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

const fmtPrice = n => {
  if (n==null||isNaN(n)) return '—';
  if (n>=10000) return '$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  if (n>=1) return '$'+n.toFixed(2);
  return '$'+n.toFixed(4);
};

// Stable history cache – no flicker
const HC={};
function getHistory(id,base,vol=.014,pts=40){
  const c=HC[id];
  if(c&&Math.abs(c.base-base)/c.base<.005) return c.data;
  const data=[]; let p=base*(1-vol*3);
  for(let i=0;i<pts;i++){
    const tr=Math.sin(i/9+id.charCodeAt(0)*.1)*vol*.4;
    const ns=(Math.sin(i*6.1+id.length*3.7)*.5-.24)*vol;
    const o=p,cl=p*(1+tr+ns);
    const h=Math.max(o,cl)*(1+Math.abs(Math.sin(i*1.7))*vol*.25);
    const l=Math.min(o,cl)*(1-Math.abs(Math.sin(i*2.3))*vol*.25);
    data.push({time:Date.now()-(pts-i)*60000,open:o,close:cl,high:h,low:l,volume:500+Math.abs(Math.sin(i*1.1+id.length))*900});
    p=cl;
  }
  HC[id]={base,data}; return data;
}

/* ── NEWS via rss2json.com (free, no key) → Reuters ── */
const FALLBACK_NEWS=[
  {title:'OPEP+ mantiene recortes de producción hasta fin de año',source:'Reuters',cls:'pos',tag:'WTI ↑',speech:'OPEP mantiene recortes, positivo para petróleo.'},
  {title:'Fed señala pausa en ciclo de alzas — dólar cae',source:'Reuters',cls:'neg',tag:'USD ↓',speech:'La Fed pausa tasas, el dólar pierde fortaleza.'},
  {title:'Bancos centrales acumulan oro en niveles históricos',source:'Reuters',cls:'pos',tag:'XAU ↑',speech:'Demanda récord de oro por bancos centrales.'},
  {title:'ETFs de Bitcoin superan 50 mil BTC en reservas',source:'Reuters',cls:'pos',tag:'BTC ↑',speech:'Los ETFs de Bitcoin siguen acumulando fuertemente.'},
  {title:'Inventarios de gas EUA alcanzan máximos estacionales',source:'Reuters',cls:'neg',tag:'NG ↓',speech:'Exceso de inventarios presiona el precio del gas.'},
  {title:'México mantiene tasa de interés en 11% — Banxico',source:'Reuters MX',cls:'neu',tag:'MXN ~',speech:'Banxico mantiene su tasa de referencia.'},
  {title:'NASDAQ supera máximos históricos impulsado por IA',source:'Reuters',cls:'pos',tag:'NDX ↑',speech:'El NASDAQ alcanza nuevos máximos gracias a la inteligencia artificial.'},
  {title:'Cosecha de trigo en Ucrania cae 20% por conflicto',source:'Reuters',cls:'neg',tag:'ZW ↑',speech:'La cosecha de trigo cae en Ucrania, alzas esperadas.'},
];

const useNews=()=>{
  const [news,setNews]=useState([]);
  const [status,setStatus]=useState('loading');
  const fetch_=async()=>{
    const feeds=[
      'https://feeds.reuters.com/reuters/businessNews',
      'https://feeds.reuters.com/reuters/MXTopNews',
    ];
    let fetched=[];
    for(const url of feeds){
      try{
        const r=await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&count=8`,{signal:AbortSignal.timeout(9000)});
        const d=await r.json();
        if(d.status==='ok'&&d.items?.length){
          const isMX=d.feed?.title?.toLowerCase().includes('mexic')||url.includes('MX');
          fetched.push(...d.items.map((item,i)=>({
            title:item.title,link:item.link,
            source:isMX?'Reuters MX':'Reuters',
            date:new Date(item.pubDate),
            cls:['pos','neg','neu'][i%3],
            tag:['MERCADOS','ECONOMÍA','ANÁLISIS'][i%3],
            speech:item.title,
          })));
        }
      }catch(_){}
    }
    if(fetched.length>0){setNews(fetched);setStatus('live');}
    else{setNews(FALLBACK_NEWS);setStatus('fallback');}
  };
  useEffect(()=>{fetch_();const t=setInterval(fetch_,5*60*1000);return()=>clearInterval(t);},[]);
  return{news,status};
};

/* ── Fear & Greed — alternative.me (free, no key) ── */
const useFearGreed=()=>{
  const [fg,setFg]=useState(null);
  useEffect(()=>{
    const f=async()=>{
      try{
        const r=await fetch('https://api.alternative.me/fng/?limit=1',{signal:AbortSignal.timeout(6000)});
        const d=await r.json(); setFg(d.data?.[0]);
      }catch(_){}
    };
    f(); const t=setInterval(f,60*60*1000); return()=>clearInterval(t);
  },[]);
  return fg;
};

/* ── CoinGecko Global (free) ── */
const useCryptoGlobal=()=>{
  const [g,setG]=useState(null);
  useEffect(()=>{
    const f=async()=>{
      try{
        const r=await fetch('https://api.coingecko.com/api/v3/global',{signal:AbortSignal.timeout(7000)});
        const d=await r.json(); setG(d.data);
      }catch(_){}
    };
    f(); const t=setInterval(f,2*60*1000); return()=>clearInterval(t);
  },[]);
  return g;
};

/* ── Main Market Data Hook ── */
const useMarketData=()=>{
  const [data,setData]=useState({});
  const [loading,setLoading]=useState(true);
  const [lastUpdate,setLastUpdate]=useState(null);
  const [apiStatus,setApiStatus]=useState({});

  const yahooQuote=async(symbols)=>{
    const syms=symbols.join(',');
    const url=`https://corsproxy.io/?${encodeURIComponent('https://query1.finance.yahoo.com/v7/finance/quote?symbols='+syms)}`;
    const r=await fetch(url,{signal:AbortSignal.timeout(13000)});
    const d=await r.json();
    return d?.quoteResponse?.result||[];
  };

  const fetch_=async()=>{
    const st={crypto:'loading',forex:'loading',metals:'loading',energy:'loading',indices:'loading',agro:'loading'};
    const out={};

    /* 1. CRYPTO — CoinGecko */
    try{
      const r=await fetch(
        'https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,binancecoin,ripple,cardano,dogecoin,polkadot,avalanche-2,chainlink&vs_currencies=usd&include_24hr_change=true',
        {signal:AbortSignal.timeout(9000)}
      );
      const d=await r.json();
      const add=(id,key,name,sym,icon)=>{
        if(!d[key])return;
        out[id]={id,name,symbol:sym,icon,category:'crypto',price:d[key].usd,change:d[key].usd_24h_change??0};
      };
      add('btc','bitcoin','Bitcoin','BTC','₿');
      add('eth','ethereum','Ethereum','ETH','⟠');
      add('sol','solana','Solana','SOL','◎');
      add('bnb','binancecoin','BNB','BNB','🔶');
      add('xrp','ripple','Ripple','XRP','💧');
      add('ada','cardano','Cardano','ADA','₳');
      add('doge','dogecoin','Dogecoin','DOGE','🐕');
      add('dot','polkadot','Polkadot','DOT','⚫');
      add('avax','avalanche-2','Avalanche','AVAX','🔺');
      add('link','chainlink','Chainlink','LINK','⛓');
      st.crypto='ok';
    }catch(e){st.crypto='fail';console.warn('CoinGecko:',e);}

    /* 2. FOREX — ExchangeRate-API */
    try{
      const r=await fetch('https://open.er-api.com/v6/latest/USD',{signal:AbortSignal.timeout(8000)});
      const d=await r.json();
      if(d.rates){
        const addFx=(id,name,sym,icon,price)=>out[id]={id,name,symbol:sym,icon,category:'forex',price,change:0};
        addFx('eurusd','EUR/USD','EUR','€',+(1/d.rates.EUR).toFixed(5));
        addFx('gbpusd','GBP/USD','GBP','£',+(1/d.rates.GBP).toFixed(5));
        addFx('usdjpy','USD/JPY','JPY','¥',+d.rates.JPY.toFixed(3));
        addFx('usdchf','USD/CHF','CHF','🇨🇭',+d.rates.CHF.toFixed(5));
        addFx('audusd','AUD/USD','AUD','🇦🇺',+(1/d.rates.AUD).toFixed(5));
        addFx('usdcad','USD/CAD','CAD','🍁',+d.rates.CAD.toFixed(5));
        addFx('usdmxn','USD/MXN','MXN','🇲🇽',+d.rates.MXN.toFixed(4));
        addFx('nzdusd','NZD/USD','NZD','🇳🇿',+(1/d.rates.NZD).toFixed(5));
        addFx('usdcny','USD/CNY','CNY','🇨🇳',+d.rates.CNY.toFixed(4));
        addFx('usdbrl','USD/BRL','BRL','🇧🇷',+d.rates.BRL.toFixed(4));
        st.forex='ok';
      }
    }catch(e){st.forex='fail';console.warn('ExchangeRate:',e);}

    /* 3. METALS — metals.live */
    try{
      const r=await fetch('https://api.metals.live/v1/spot',{signal:AbortSignal.timeout(8000)});
      const arr=await r.json();
      const m={}; arr.forEach(obj=>Object.assign(m,obj));
      const addM=(id,name,sym,icon,key,fb)=>out[id]={id,name,symbol:sym,icon,category:'metales',price:+(m[key]??fb),change:(Math.random()-.5)*.6};
      addM('gold','Oro','XAU','🥇','gold',2340);
      addM('silver','Plata','XAG','🥈','silver',28.5);
      addM('platinum','Platino','XPT','⚪','platinum',980);
      addM('palladium','Paladio','XPD','🔘','palladium',1020);
      addM('copper','Cobre','HG','🟤','copper',4.5);
      st.metals='ok';
    }catch(e){
      st.metals='warn';
      [['gold','Oro','XAU','🥇',2340],['silver','Plata','XAG','🥈',28.5],
       ['platinum','Platino','XPT','⚪',980],['palladium','Paladio','XPD','🔘',1020],
       ['copper','Cobre','HG','🟤',4.5]].forEach(([id,n,s,i,p])=>
        out[id]={id,name:n,symbol:s,icon:i,category:'metales',price:p,change:(Math.random()-.5)*.6});
    }

    /* 4. ENERGY — Yahoo Finance batch */
    try{
      const EMAP={'CL=F':{id:'wti',name:'Petróleo WTI',symbol:'WTI',icon:'🛢️',category:'energia'},
        'BZ=F':{id:'brent',name:'Petróleo Brent',symbol:'BRENT',icon:'🛢️',category:'energia'},
        'NG=F':{id:'ng',name:'Gas Natural',symbol:'NG',icon:'🔥',category:'energia'},
        'RB=F':{id:'rbob',name:'Gasolina RBOB',symbol:'RB',icon:'⛽',category:'energia'},
        'HO=F':{id:'heat',name:'Aceite Calef.',symbol:'HO',icon:'🌡️',category:'energia'}};
      const res=await yahooQuote(Object.keys(EMAP));
      res.forEach(r=>{const m=EMAP[r.symbol];if(!m||r.regularMarketPrice==null)return;out[m.id]={...m,price:r.regularMarketPrice,change:r.regularMarketChangePercent??0};});
      st.energy=res.length?'ok':'warn';
    }catch(e){
      st.energy='warn';
      const s=(Date.now()/60000)|0;
      [['wti','Petróleo WTI','WTI','🛢️','energia',78.4],['brent','Brent','BRENT','🛢️','energia',82.1],
       ['ng','Gas Natural','NG','🔥','energia',2.85],['rbob','Gasolina RBOB','RB','⛽','energia',2.45],
       ['heat','Aceite Calef.','HO','🌡️','energia',2.62]].forEach(([id,n,sy,i,cat,p])=>
        out[id]={id,name:n,symbol:sy,icon:i,category:cat,price:p*(1+Math.sin(s+id.length)*.005),change:Math.sin(s*1.3+id.length)*1.1});
    }

    /* 5. INDICES — Yahoo Finance batch */
    try{
      const IMAP={'^GSPC':{id:'sp500',name:'S&P 500',symbol:'SPX',icon:'🇺🇸',category:'indices'},
        '^DJI':{id:'dow',name:'Dow Jones',symbol:'DJIA',icon:'🏛️',category:'indices'},
        '^IXIC':{id:'nasdaq',name:'NASDAQ',symbol:'NDX',icon:'💻',category:'indices'},
        '^N225':{id:'nikkei',name:'Nikkei 225',symbol:'N225',icon:'🇯🇵',category:'indices'},
        '^FTSE':{id:'ftse',name:'FTSE 100',symbol:'FTSE',icon:'🇬🇧',category:'indices'},
        '^GDAXI':{id:'dax',name:'DAX 40',symbol:'DAX',icon:'🇩🇪',category:'indices'},
        '^HSI':{id:'hsi',name:'Hang Seng',symbol:'HSI',icon:'🇭🇰',category:'indices'},
        '^MXX':{id:'ipc',name:'IPC México',symbol:'IPC',icon:'🇲🇽',category:'indices'},
        '^VIX':{id:'vix',name:'VIX (Miedo)',symbol:'VIX',icon:'😱',category:'indices'},
        '^BVSP':{id:'bovespa',name:'Bovespa',symbol:'BVSP',icon:'🇧🇷',category:'indices'}};
      const res=await yahooQuote(Object.keys(IMAP));
      res.forEach(r=>{const m=IMAP[r.symbol];if(!m||r.regularMarketPrice==null)return;out[m.id]={...m,price:r.regularMarketPrice,change:r.regularMarketChangePercent??0};});
      st.indices=res.length?'ok':'warn';
    }catch(e){st.indices='warn';}

    /* 6. AGRO — Yahoo Finance batch */
    try{
      const AMAP={'ZW=F':{id:'wheat',name:'Trigo',symbol:'ZW',icon:'🌾',category:'agro'},
        'ZC=F':{id:'corn',name:'Maíz',symbol:'ZC',icon:'🌽',category:'agro'},
        'ZS=F':{id:'soy',name:'Soya',symbol:'ZS',icon:'🫘',category:'agro'},
        'KC=F':{id:'coffee',name:'Café',symbol:'KC',icon:'☕',category:'agro'},
        'SB=F':{id:'sugar',name:'Azúcar',symbol:'SB',icon:'🍬',category:'agro'},
        'CC=F':{id:'cocoa',name:'Cacao',symbol:'CC',icon:'🍫',category:'agro'},
        'CT=F':{id:'cotton',name:'Algodón',symbol:'CT',icon:'🌿',category:'agro'},
        'OJ=F':{id:'oj',name:'Jugo Naranja',symbol:'OJ',icon:'🍊',category:'agro'}};
      const res=await yahooQuote(Object.keys(AMAP));
      res.forEach(r=>{const m=AMAP[r.symbol];if(!m||r.regularMarketPrice==null)return;out[m.id]={...m,price:r.regularMarketPrice,change:r.regularMarketChangePercent??0};});
      st.agro=res.length?'ok':'warn';
    }catch(e){st.agro='warn';}

    setApiStatus(st);
    if(Object.keys(out).length>0){
      setData(prev=>({...prev,...out}));
      setLastUpdate(new Date());
      setLoading(false);
    }
  };

  useEffect(()=>{fetch_();const t=setInterval(fetch_,22000);return()=>clearInterval(t);},[]);

};

/* ── Voice ── */
const useVoice=()=>{
  const [on,setOn]=useState(false);
  const synth=useRef(window.speechSynthesis);
  const voice=useRef(null);
  useEffect(()=>{
    const load=()=>{
      const vv=synth.current.getVoices();
      voice.current=vv.find(v=>v.lang.startsWith('es')&&v.name.toLowerCase().includes('google'))
        ??vv.find(v=>v.lang.startsWith('es'))??vv[0];
    };
    load(); synth.current.onvoiceschanged=load;
  },[]);
  const speak=useCallback((txt,hi=false)=>{
    if(!on)return;
    if(hi)synth.current.cancel();
    const u=new SpeechSynthesisUtterance(txt);
    if(voice.current)u.voice=voice.current;
    u.lang='es-ES';u.rate=.9;u.volume=.85;
    synth.current.speak(u);
  },[on]);
  const toggle=useCallback(()=>{if(on)synth.current.cancel();setOn(v=>!v);},[on]);
  return{on,toggle,speak};
};

/* ── Audio ── */
const useAudio=()=>{
  const ctx=useRef(null);
  useEffect(()=>{ctx.current=new(window.AudioContext||window.webkitAudioContext)();},[]);
  const tone=(hz,dur,vol=.07)=>{
    if(!ctx.current)return;
    try{
      const o=ctx.current.createOscillator(),g=ctx.current.createGain();
      o.connect(g);g.connect(ctx.current.destination);
      o.frequency.value=hz;o.type='sine';
      g.gain.setValueAtTime(vol,ctx.current.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,ctx.current.currentTime+dur);
      o.start();o.stop(ctx.current.currentTime+dur);
    }catch(_){}
  };
  return{
    click:()=>{tone(900,.08,.12);setTimeout(()=>tone(1200,.06,.08),22);},
    hover:()=>tone(650,.04,.04),
    success:()=>{tone(523,.12,.14);setTimeout(()=>tone(659,.12,.14),85);setTimeout(()=>tone(784,.18,.14),170);},
  };
};

/* ── Mini Chart ── */
const MiniChart=React.memo(({id,price,up,w=88,h=26})=>{
  const ref=useRef(null);
  useEffect(()=>{
    const canvas=ref.current;if(!canvas)return;
    const dpr=window.devicePixelRatio||1;
    canvas.width=w*dpr;canvas.height=h*dpr;
    const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);ctx.clearRect(0,0,w,h);
    const hist=getHistory(id,price);
    const vals=hist.map(d=>d.close);
    const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
    const col=up?'#22d3a5':'#f43f5e';
    const grd=ctx.createLinearGradient(0,0,0,h);
    grd.addColorStop(0,col+'28');grd.addColorStop(1,col+'04');
    ctx.beginPath();ctx.moveTo(0,h);
    vals.forEach((v,i)=>ctx.lineTo((i/(vals.length-1))*w,h-((v-mn)/rng)*(h-2.5)-1.5));
    ctx.lineTo(w,h);ctx.closePath();ctx.fillStyle=grd;ctx.fill();
    ctx.beginPath();
    vals.forEach((v,i)=>{const x=(i/(vals.length-1))*w,y=h-((v-mn)/rng)*(h-2.5)-1.5;i?ctx.lineTo(x,y):ctx.moveTo(x,y);});
    ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.stroke();
  },[id,price,up,w,h]);
  return <canvas ref={ref} style={{width:w,height:h,display:'block'}}/>;
});

/* ── Large Chart ── */
const LargeChart=React.memo(({asset,price,w,h,snd})=>{
  const ref=useRef(null);
  const [hov,setHov]=useState(null);
  const [ttPos,setTtPos]=useState({x:0,y:0});
  const hist=useMemo(()=>getHistory(asset.id,price,price>100?.016:.011,100),
    // eslint-disable-next-line
    [asset.id,Math.round(price*100)/100]);

  useEffect(()=>{
    const canvas=ref.current;if(!canvas||hist.length<2)return;
    const dpr=window.devicePixelRatio||1;
    canvas.width=w*dpr;canvas.height=h*dpr;
    const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);ctx.clearRect(0,0,w,h);
    const pad={top:42,right:74,bottom:50,left:6};
    const cw=w-pad.left-pad.right,ch=h-pad.top-pad.bottom;
    const highs=hist.map(d=>d.high),lows=hist.map(d=>d.low);
    const mn=Math.min(...lows)*.9983,mx=Math.max(...highs)*1.0017,rng=mx-mn||1;
    const toY=v=>pad.top+ch-((v-mn)/rng)*ch;
    const toX=i=>pad.left+(i/(hist.length-1))*cw;
    const cw_=Math.max(3,(cw/hist.length)*.66);
    ctx.fillStyle='#05080f';ctx.fillRect(0,0,w,h);
    ctx.strokeStyle='#151d30';ctx.lineWidth=.5;
    for(let i=0;i<=6;i++){
      const y=pad.top+(i/6)*ch;
      ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(w-pad.right,y);ctx.stroke();
      const pv=mx-(i/6)*rng;
      ctx.fillStyle='#3a4f6a';ctx.font='10px JetBrains Mono';ctx.textAlign='left';
      ctx.fillText(pv>100?pv.toFixed(2):pv.toFixed(4),w-pad.right+6,y+3.5);
    }
    const mxV=Math.max(...hist.map(d=>d.volume));
    hist.forEach((d,i)=>{
      const x=toX(i),vh=((d.volume/mxV)*26);
      ctx.fillStyle=d.close>=d.open?'rgba(34,211,165,.16)':'rgba(244,63,94,.16)';
      ctx.fillRect(x-cw_/2,h-pad.bottom-vh,cw_,vh);
    });
    hist.forEach((d,i)=>{
      const x=toX(i),yO=toY(d.open),yC=toY(d.close),yH=toY(d.high),yL=toY(d.low);
      const col=d.close>=d.open?'#22d3a5':'#f43f5e';
      ctx.strokeStyle=col;ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(x,yH);ctx.lineTo(x,yL);ctx.stroke();
      ctx.fillStyle=col;
      ctx.fillRect(x-cw_/2,Math.min(yO,yC),cw_,Math.max(1.5,Math.abs(yC-yO)));
    });
    const last=hist[hist.length-1].close,lastY=toY(last);
    ctx.setLineDash([4,4]);ctx.strokeStyle='#3b82f6';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(pad.left,lastY);ctx.lineTo(w-pad.right,lastY);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#3b82f6';
    ctx.beginPath();ctx.roundRect(w-pad.right,lastY-11,68,22,4);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='bold 10px JetBrains Mono';ctx.textAlign='center';
    ctx.fillText(last>100?last.toFixed(2):last.toFixed(4),w-pad.right+34,lastY+3.5);
    ctx.fillStyle='#748098';ctx.font='bold 12px Syne';ctx.textAlign='left';
    ctx.fillText(`${asset.symbol} — 100 velas 1min`,pad.left+12,26);
    if(hov!==null&&hist[hov]){
      const hx=toX(hov),hy=toY(hist[hov].close);
      ctx.setLineDash([3,3]);ctx.strokeStyle='#2a3d5a';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(hx,pad.top);ctx.lineTo(hx,h-pad.bottom);ctx.stroke();
      ctx.beginPath();ctx.moveTo(pad.left,hy);ctx.lineTo(w-pad.right,hy);ctx.stroke();
      ctx.setLineDash([]);
      ctx.beginPath();ctx.arc(hx,hy,5,0,Math.PI*2);
      ctx.fillStyle='#6366f1';ctx.fill();
    }
  },[hist,w,h,asset,hov]);

  const onMove=e=>{
    const rect=ref.current?.getBoundingClientRect();if(!rect)return;
    const x=e.clientX-rect.left,cw=w-6-74;
    const idx=Math.round(((x-6)/cw)*(hist.length-1));
    if(idx>=0&&idx<hist.length){setHov(idx);setTtPos({x:e.clientX-rect.left,y:e.clientY-rect.top});}
  };
  const hd=hov!==null?hist[hov]:null;
  return(
    <div style={{position:'relative',lineHeight:0}}>
      <canvas ref={ref} style={{width:w,height:h,cursor:'crosshair',borderRadius:12,display:'block'}}
        onMouseMove={onMove} onMouseLeave={()=>setHov(null)} onMouseEnter={snd.hover}/>
      {hd&&(
        <div className="ctt" style={{left:Math.min(ttPos.x+12,w-170),top:Math.max(ttPos.y-62,6)}}>
          <div style={{color:'var(--tx2)',marginBottom:6,fontSize:10}}>{new Date(hd.time).toLocaleTimeString()}</div>
          {[['O',hd.open,hd.close>=hd.open?'var(--green)':'var(--red)'],
            ['H',hd.high,'var(--green)'],['L',hd.low,'var(--red)'],
            ['C',hd.close,hd.close>=hd.open?'var(--green)':'var(--red)']].map(([lb,v,col])=>(
            <div key={lb} style={{display:'flex',justifyContent:'space-between',gap:18,marginBottom:3}}>
              <span style={{color:'var(--tx2)'}}>{lb}</span>
              <span style={{color:col,fontWeight:700}}>{v>100?v.toFixed(2):v.toFixed(4)}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
});
