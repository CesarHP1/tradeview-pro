<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeView Pro - Dashboard Financiero en Tiempo Real</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e17;
            color: #e1e5eb;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb { background: #2d333b; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #444c56; }
        @keyframes pulse-green {
            0%, 100% { color: #00d4aa; }
            50% { color: #00ffcc; }
        }
        @keyframes pulse-red {
            0%, 100% { color: #ff4757; }
            50% { color: #ff6b7a; }
        }
        @keyframes flash-green {
            0% { background: rgba(0, 212, 170, 0.3); }
            100% { background: transparent; }
        }
        @keyframes flash-red {
            0% { background: rgba(255, 71, 87, 0.3); }
            100% { background: transparent; }
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .flash-up { animation: flash-green 0.5s ease-out; }
        .flash-down { animation: flash-red 0.5s ease-out; }
        .slide-in { animation: slideIn 0.3s ease-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        // ==================== DATA GENERATION ====================
        const generateInitialHistory = (base, volatility, points = 60) => {
            const data = [];
            let current = base;
            for (let i = 0; i < points; i++) {
                const change = (Math.random() - 0.48) * volatility;
                current += change;
                data.push({
                    value: current,
                    time: Date.now() - (points - i) * 2000,
                    high: current + Math.random() * volatility * 0.5,
                    low: current - Math.random() * volatility * 0.5,
                    open: current - change * 0.3,
                    close: current
                });
            }
            return data;
        };

        const ASSETS = {
            metales: [
                { id: 'gold', name: 'Oro (XAU/USD)', symbol: 'XAU', basePrice: 2345.50, volatility: 2.5, icon: '🥇', category: 'metal' },
                { id: 'silver', name: 'Plata (XAG/USD)', symbol: 'XAG', basePrice: 28.45, volatility: 0.15, icon: '🥈', category: 'metal' },
                { id: 'platinum', name: 'Platino (XPT/USD)', symbol: 'XPT', basePrice: 985.30, volatility: 3.0, icon: '⚪', category: 'metal' },
                { id: 'palladium', name: 'Paladio (XPD/USD)', symbol: 'XPD', basePrice: 1025.80, volatility: 4.0, icon: '🔘', category: 'metal' },
                { id: 'copper', name: 'Cobre (HG)', symbol: 'HG', basePrice: 4.52, volatility: 0.03, icon: '🟤', category: 'metal' },
            ],
            bolsa: [
                { id: 'sp500', name: 'S&P 500', symbol: 'SPX', basePrice: 5234.18, volatility: 8.0, icon: '📊', category: 'index' },
                { id: 'nasdaq', name: 'NASDAQ Composite', symbol: 'IXIC', basePrice: 16399.52, volatility: 25.0, icon: '💻', category: 'index' },
                { id: 'dow', name: 'Dow Jones', symbol: 'DJI', basePrice: 39872.99, volatility: 50.0, icon: '🏛️', category: 'index' },
                { id: 'ibex', name: 'IBEX 35', symbol: 'IBEX', basePrice: 10892.30, volatility: 15.0, icon: '🇪🇸', category: 'index' },
                { id: 'nikkei', name: 'Nikkei 225', symbol: 'N225', basePrice: 38456.70, volatility: 80.0, icon: '🇯🇵', category: 'index' },
            ],
            acciones: [
                { id: 'aapl', name: 'Apple Inc.', symbol: 'AAPL', basePrice: 189.84, volatility: 1.2, icon: '🍎', category: 'stock' },
                { id: 'msft', name: 'Microsoft Corp.', symbol: 'MSFT', basePrice: 417.88, volatility: 2.0, icon: '🪟', category: 'stock' },
                { id: 'googl', name: 'Alphabet Inc.', symbol: 'GOOGL', basePrice: 174.13, volatility: 1.5, icon: '🔍', category: 'stock' },
                { id: 'amzn', name: 'Amazon.com Inc.', symbol: 'AMZN', basePrice: 186.49, volatility: 1.8, icon: '📦', category: 'stock' },
                { id: 'tsla', name: 'Tesla Inc.', symbol: 'TSLA', basePrice: 248.42, volatility: 5.0, icon: '🚗', category: 'stock' },
                { id: 'nvda', name: 'NVIDIA Corp.', symbol: 'NVDA', basePrice: 875.28, volatility: 8.0, icon: '🎮', category: 'stock' },
                { id: 'meta', name: 'Meta Platforms', symbol: 'META', basePrice: 505.75, volatility: 4.0, icon: '👤', category: 'stock' },
            ],
            bienesRaices: [
                { id: 'vnq', name: 'VNQ REIT Index', symbol: 'VNQ', basePrice: 88.45, volatility: 0.5, icon: '🏢', category: 'realestate' },
                { id: 'iyr', name: 'iShares Real Estate', symbol: 'IYR', basePrice: 92.30, volatility: 0.4, icon: '🏗️', category: 'realestate' },
                { id: 'xlre', name: 'Real Estate Select', symbol: 'XLRE', basePrice: 38.72, volatility: 0.3, icon: '🏠', category: 'realestate' },
                { id: 'hqh', name: 'Tekla Healthcare', symbol: 'HQH', basePrice: 18.95, volatility: 0.15, icon: '🏥', category: 'realestate' },
            ],
            crypto: [
                { id: 'btc', name: 'Bitcoin', symbol: 'BTC', basePrice: 67234.50, volatility: 200.0, icon: '₿', category: 'crypto' },
                { id: 'eth', name: 'Ethereum', symbol: 'ETH', basePrice: 3456.80, volatility: 30.0, icon: '⟠', category: 'crypto' },
                { id: 'sol', name: 'Solana', symbol: 'SOL', basePrice: 172.45, volatility: 3.0, icon: '◎', category: 'crypto' },
                { id: 'bnb', name: 'BNB', symbol: 'BNB', basePrice: 598.30, volatility: 4.0, icon: '🔶', category: 'crypto' },
            ],
            forex: [
                { id: 'eurusd', name: 'EUR/USD', symbol: 'EUR', basePrice: 1.0845, volatility: 0.001, icon: '💶', category: 'forex' },
                { id: 'gbpusd', name: 'GBP/USD', symbol: 'GBP', basePrice: 1.2712, volatility: 0.0015, icon: '💷', category: 'forex' },
                { id: 'usdjpy', name: 'USD/JPY', symbol: 'JPY', basePrice: 154.32, volatility: 0.1, icon: '💴', category: 'forex' },
            ]
        };

        // ==================== MINI CHART COMPONENT ====================
        const MiniChart = ({ data, color, width = 120, height = 40 }) => {
            const canvasRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas || data.length < 2) return;
                const ctx = canvas.getContext('2d');
                const dpr = window.devicePixelRatio || 1;
                canvas.width = width * dpr;
                canvas.height = height * dpr;
                ctx.scale(dpr, dpr);

                const values = data.map(d => d.value);
                const min = Math.min(...values);
                const max = Math.max(...values);
                const range = max - min || 1;

                ctx.clearRect(0, 0, width, height);

                // Gradient fill
                const gradient = ctx.createLinearGradient(0, 0, 0, height);
                gradient.addColorStop(0, color + '30');
                gradient.addColorStop(1, color + '05');

                ctx.beginPath();
                ctx.moveTo(0, height);
                data.forEach((d, i) => {
                    const x = (i / (data.length - 1)) * width;
                    const y = height - ((d.value - min) / range) * (height - 4) - 2;
                    if (i === 0) ctx.lineTo(x, y);
                    else ctx.lineTo(x, y);
                });
                ctx.lineTo(width, height);
                ctx.closePath();
                ctx.fillStyle = gradient;
                ctx.fill();

                // Line
                ctx.beginPath();
                data.forEach((d, i) => {
                    const x = (i / (data.length - 1)) * width;
                    const y = height - ((d.value - min) / range) * (height - 4) - 2;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                });
                ctx.strokeStyle = color;
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // Current price dot
                const lastX = width;
                const lastY = height - ((data[data.length - 1].value - min) / range) * (height - 4) - 2;
                ctx.beginPath();
                ctx.arc(lastX, lastY, 3, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(lastX, lastY, 5, 0, Math.PI * 2);
                ctx.strokeStyle = color + '60';
                ctx.lineWidth = 1;
                ctx.stroke();
            }, [data, color, width, height]);

            return <canvas ref={canvasRef} width={width} height={height} style={{ width, height }} />;
        };

        // ==================== LARGE CHART COMPONENT ====================
        const LargeChart = ({ data, symbol, name, width, height }) => {
            const canvasRef = useRef(null);
            const [hoveredIndex, setHoveredIndex] = useState(null);
            const [mousePos, setMousePos] = useState({ x: 0, y: 0 });

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas || data.length < 2) return;
                const ctx = canvas.getContext('2d');
                const dpr = window.devicePixelRatio || 1;
                canvas.width = width * dpr;
                canvas.height = height * dpr;
                ctx.scale(dpr, dpr);

                const values = data.map(d => d.value);
                const highs = data.map(d => d.high);
                const lows = data.map(d => d.low);
                const min = Math.min(...lows) * 0.999;
                const max = Math.max(...highs) * 1.001;
                const range = max - min || 1;
                const padding = { top: 30, right: 60, bottom: 40, left: 10 };
                const chartW = width - padding.left - padding.right;
                const chartH = height - padding.top - padding.bottom;

                const isUp = data[data.length - 1].value >= data[0].value;
                const mainColor = isUp ? '#00d4aa' : '#ff4757';

                ctx.clearRect(0, 0, width, height);

                // Background
                ctx.fillStyle = '#0d1117';
                ctx.beginPath();
                ctx.roundRect(0, 0, width, height, 8);
                ctx.fill();

                // Grid lines
                ctx.strokeStyle = '#1c2333';
                ctx.lineWidth = 0.5;
                const gridLines = 5;
                for (let i = 0; i <= gridLines; i++) {
                    const y = padding.top + (i / gridLines) * chartH;
                    ctx.beginPath();
                    ctx.moveTo(padding.left, y);
                    ctx.lineTo(width - padding.right, y);
                    ctx.stroke();

                    // Price labels
                    const price = max - (i / gridLines) * range;
                    ctx.fillStyle = '#5a6577';
                    ctx.font = '11px Inter';
                    ctx.textAlign = 'left';
                    ctx.fillText(price.toFixed(price > 100 ? 2 : 4), width - padding.right + 5, y + 4);
                }

                // Volume bars
                const maxVol = Math.max(...data.map((d, i) => Math.abs(d.value - (data[i - 1]?.value || d.value))));
                data.forEach((d, i) => {
                    const x = padding.left + (i / (data.length - 1)) * chartW;
                    const vol = Math.abs(d.value - (data[i - 1]?.value || d.value));
                    const barH = (vol / maxVol) * 20;
                    const barColor = d.close >= d.open ? 'rgba(0,212,170,0.15)' : 'rgba(255,71,87,0.15)';
                    ctx.fillStyle = barColor;
                    ctx.fillRect(x - 1, height - padding.bottom - barH, 3, barH);
                });

                // Gradient fill
                const gradient = ctx.createLinearGradient(0, padding.top, 0, height - padding.bottom);
                gradient.addColorStop(0, mainColor + '25');
                gradient.addColorStop(0.5, mainColor + '08');
                gradient.addColorStop(1, mainColor + '00');

                ctx.beginPath();
                ctx.moveTo(padding.left, height - padding.bottom);
                data.forEach((d, i) => {
                    const x = padding.left + (i / (data.length - 1)) * chartW;
                    const y = padding.top + (1 - (d.value - min) / range) * chartH;
                    ctx.lineTo(x, y);
                });
                ctx.lineTo(padding.left + chartW, height - padding.bottom);
                ctx.closePath();
                ctx.fillStyle = gradient;
                ctx.fill();

                // Main line
                ctx.beginPath();
                data.forEach((d, i) => {
                    const x = padding.left + (i / (data.length - 1)) * chartW;
                    const y = padding.top + (1 - (d.value - min) / range) * chartH;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                });
                ctx.strokeStyle = mainColor;
                ctx.lineWidth = 2;
                ctx.stroke();

                // Glow effect
                ctx.strokeStyle = mainColor + '40';
                ctx.lineWidth = 6;
                ctx.beginPath();
                data.forEach((d, i) => {
                    const x = padding.left + (i / (data.length - 1)) * chartW;
                    const y = padding.top + (1 - (d.value - min) / range) * chartH;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                });
                ctx.stroke();

                // Candlestick overlay
                const candleWidth = Math.max(1, chartW / data.length * 0.6);
                data.forEach((d, i) => {
                    const x = padding.left + (i / (data.length - 1)) * chartW;
                    const yOpen = padding.top + (1 - (d.open - min) / range) * chartH;
                    const yClose = padding.top + (1 - (d.close - min) / range) * chartH;
                    const yHigh = padding.top + (1 - (d.high - min) / range) * chartH;
                    const yLow = padding.top + (1 - (d.low - min) / range) * chartH;

                    const bullish = d.close >= d.open;
                    ctx.strokeStyle = bullish ? '#00d4aa' : '#ff4757';
                    ctx.lineWidth = 1;

                    // Wick
                    ctx.beginPath();
                    ctx.moveTo(x, yHigh);
                    ctx.lineTo(x, yLow);
                    ctx.stroke();

                    // Body
                    ctx.fillStyle = bullish ? '#00d4aa' : '#ff4757';
                    const bodyTop = Math.min(yOpen, yClose);
                    const bodyHeight = Math.max(1, Math.abs(yClose - yOpen));
                    ctx.fillRect(x - candleWidth / 2, bodyTop, candleWidth, bodyHeight);
                });

                // Current price line
                const lastValue = data[data.length - 1].value;
                const lastY = padding.top + (1 - (lastValue - min) / range) * chartH;
                ctx.setLineDash([4, 4]);
                ctx.strokeStyle = mainColor + '80';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(padding.left, lastY);
                ctx.lineTo(width - padding.right, lastY);
                ctx.stroke();
                ctx.setLineDash([]);

                // Price tag
                ctx.fillStyle = mainColor;
                ctx.beginPath();
                ctx.roundRect(width - padding.right, lastY - 10, 55, 20, 3);
                ctx.fill();
                ctx.fillStyle = '#000';
                ctx.font = 'bold 10px Inter';
                ctx.textAlign = 'center';
                ctx.fillText(lastValue.toFixed(lastValue > 100 ? 2 : 4), width - padding.right + 27, lastY + 4);

                // Hover crosshair
                if (hoveredIndex !== null && hoveredIndex < data.length) {
                    const hx = padding.left + (hoveredIndex / (data.length - 1)) * chartW;
                    const hy = padding.top + (1 - (data[hoveredIndex].value - min) / range) * chartH;

                    ctx.setLineDash([3, 3]);
                    ctx.strokeStyle = '#4a5568';
                    ctx.lineWidth = 0.5;
                    ctx.beginPath();
                    ctx.moveTo(hx, padding.top);
                    ctx.lineTo(hx, height - padding.bottom);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(padding.left, hy);
                    ctx.lineTo(width - padding.right, hy);
                    ctx.stroke();
                    ctx.setLineDash([]);

                    ctx.beginPath();
                    ctx.arc(hx, hy, 5, 0, Math.PI * 2);
                    ctx.fillStyle = mainColor;
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(hx, hy, 8, 0, Math.PI * 2);
                    ctx.strokeStyle = mainColor + '60';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }

                // Title
                ctx.fillStyle = '#e1e5eb';
                ctx.font = 'bold 14px Inter';
                ctx.textAlign = 'left';
                ctx.fillText(`${symbol}  ${name}`, padding.left + 10, 20);

                // Time labels
                ctx.fillStyle = '#5a6577';
                ctx.font = '10px Inter';
                ctx.textAlign = 'center';
                const timeStep = Math.floor(data.length / 6);
                for (let i = 0; i < data.length; i += timeStep) {
                    const x = padding.left + (i / (data.length - 1)) * chartW;
                    const time = new Date(data[i].time);
                    ctx.fillText(time.toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit', second: '2-digit' }), x, height - 8);
                }

            }, [data, symbol, name, width, height, hoveredIndex]);

            const handleMouseMove = (e) => {
                const rect = canvasRef.current.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const padding = { left: 10, right: 60 };
                const chartW = width - padding.left - padding.right;
                const index = Math.round(((x - padding.left) / chartW) * (data.length - 1));
                if (index >= 0 && index < data.length) {
                    setHoveredIndex(index);
                    setMousePos({ x: e.clientX - rect.left, y: e.clientY - rect.top });
                }
            };

            const isUp = data.length >= 2 && data[data.length - 1].value >= data[0].value;
            const currentPrice = data[data.length - 1]?.value || 0;
            const openPrice = data[0]?.value || 0;
            const change = currentPrice - openPrice;
            const changePercent = ((change / openPrice) * 100).toFixed(2);

            return (
                <div style={{ position: 'relative' }}>
                    <canvas
                        ref={canvasRef}
                        width={width}
                        height={height}
                        style={{ width, height, cursor: 'crosshair', borderRadius: 8 }}
                        onMouseMove={handleMouseMove}
                        onMouseLeave={() => setHoveredIndex(null)}
                    />
                    {hoveredIndex !== null && data[hoveredIndex] && (
                        <div className="slide-in" style={{
                            position: 'absolute',
                            top: 45,
                            left: 15,
                            background: 'rgba(13,17,23,0.95)',
                            border: '1px solid #2d333b',
                            borderRadius: 8,
                            padding: '10px 14px',
                            fontSize: 12,
                            pointerEvents: 'none',
                            backdropFilter: 'blur(10px)',
                            minWidth: 180
                        }}>
                            <div style={{ color: '#5a6577', marginBottom: 4, fontSize: 11 }}>
                                {new Date(data[hoveredIndex].time).toLocaleString('es')}
                            </div>
                            <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap' }}>
                                <div><span style={{ color: '#5a6577' }}>Abierto: </span><span style={{ color: '#e1e5eb' }}>{data[hoveredIndex].open.toFixed(2)}</span></div>
                                <div><span style={{ color: '#5a6577' }}>Cierre: </span><span style={{ color: '#e1e5eb' }}>{data[hoveredIndex].close.toFixed(2)}</span></div>
                                <div><span style={{ color: '#5a6577' }}>Máx: </span><span style={{ color: '#00d4aa' }}>{data[hoveredIndex].high.toFixed(2)}</span></div>
                                <div><span style={{ color: '#5a6577' }}>Mín: </span><span style={{ color: '#ff4757' }}>{data[hoveredIndex].low.toFixed(2)}</span></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ==================== TICKER STRIP ====================
        const TickerStrip = ({ assets, allData }) => {
            const [offset, setOffset] = useState(0);

            useEffect(() => {
                const interval = setInterval(() => {
                    setOffset(prev => prev + 0.5);
                }, 30);
                return () => clearInterval(interval);
            }, []);

            const allAssets = Object.values(assets).flat();

            return (
                <div style={{
                    background: 'linear-gradient(90deg, #0d1117, #161b22, #0d1117)',
                    borderBottom: '1px solid #21262d',
                    overflow: 'hidden',
                    height: 40,
                    display: 'flex',
                    alignItems: 'center'
                }}>
                    <div style={{
                        display: 'flex',
                        gap: 40,
                        whiteSpace: 'nowrap',
                        transform: `translateX(-${offset % (allAssets.length * 200)}px)`,
                        transition: offset % (allAssets.length * 200) === 0 ? 'none' : 'transform 0.03s linear'
                    }}>
                        {[...allAssets, ...allAssets, ...allAssets].map((asset, i) => {
                            const data = allData[asset.id];
                            if (!data || data.length < 2) return null;
                            const current = data[data.length - 1].value;
                            const prev = data[data.length - 2].value;
                            const change = current - prev;
                            const changePercent = ((change / prev) * 100).toFixed(2);
                            const isUp = change >= 0;

                            return (
                                <div key={`${asset.id}-${i}`} style={{
                                    display: 'flex',
                                    alignItems: 'center',
                                    gap: 8,
                                    fontSize: 12,
                                    minWidth: 180
                                }}>
                                    <span>{asset.icon}</span>
                                    <span style={{ fontWeight: 600, color: '#e1e5eb' }}>{asset.symbol}</span>
                                    <span style={{ color: '#8b949e' }}>{current.toFixed(current > 100 ? 2 : 4)}</span>
                                    <span style={{
                                        color: isUp ? '#00d4aa' : '#ff4757',
                                        fontWeight: 600,
                                        fontSize: 11
                                    }}>
                                        {isUp ? '▲' : '▼'} {Math.abs(changePercent)}%
                                    </span>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        // ==================== MARKET TABLE ====================
        const MarketTable = ({ assets, allData, selectedAsset, onSelect }) => {
            const [flashStates, setFlashStates] = useState({});
            const prevValues = useRef({});

            useEffect(() => {
                const newFlashes = {};
                assets.forEach(asset => {
                    const data = allData[asset.id];
                    if (data && data.length >= 2) {
                        const current = data[data.length - 1].value;
                        const prev = data[data.length - 2].value;
                        const key = asset.id;
                        if (prevValues.current[key] !== undefined && current !== prevValues.current[key]) {
                            newFlashes[key] = current > prevValues.current[key] ? 'up' : 'down';
                        }
                        prevValues.current[key] = current;
                    }
                });
                if (Object.keys(newFlashes).length > 0) {
                    setFlashStates(prev => ({ ...prev, ...newFlashes }));
                    setTimeout(() => setFlashStates({}), 600);
                }
            }, [allData]);

            return (
                <div style={{
                    background: '#0d1117',
                    borderRadius: 12,
                    border: '1px solid #21262d',
                    overflow: 'hidden'
                }}>
                    <div style={{
                        display: 'grid',
                        gridTemplateColumns: '2fr 1.2fr 1fr 1fr 1fr 100px',
                        padding: '10px 16px',
                        background: '#161b22',
                        borderBottom: '1px solid #21262d',
                        fontSize: 11,
                        color: '#5a6577',
                        fontWeight: 600,
                        textTransform: 'uppercase',
                        letterSpacing: 0.5
                    }}>
                        <span>Activo</span>
                        <span style={{ textAlign: 'right' }}>Precio</span>
                        <span style={{ textAlign: 'right' }}>Cambio</span>
                        <span style={{ textAlign: 'right' }}>Cambio %</span>
                        <span style={{ textAlign: 'right' }}>Máx/Mín</span>
                        <span style={{ textAlign: 'center' }}>Gráfico</span>
                    </div>
                    {assets.map(asset => {
                        const data = allData[asset.id];
                        if (!data || data.length < 2) return null;
                        const current = data[data.length - 1].value;
                        const open = data[0].value;
                        const change = current - open;
                        const changePercent = ((change / open) * 100);
                        const isUp = change >= 0;
                        const high = Math.max(...data.map(d => d.high));
                        const low = Math.min(...data.map(d => d.low));
                        const isSelected = selectedAsset === asset.id;
                        const flash = flashStates[asset.id];

                        return (
                            <div key={asset.id}
                                className={`slide-in ${flash === 'up' ? 'flash-up' : flash === 'down' ? 'flash-down' : ''}`}
                                onClick={() => onSelect(asset.id)}
                                style={{
                                    display: 'grid',
                                    gridTemplateColumns: '2fr 1.2fr 1fr 1fr 1fr 100px',
                                    padding: '12px 16px',
                                    borderBottom: '1px solid #161b22',
                                    cursor: 'pointer',
                                    background: isSelected ? 'rgba(0,212,170,0.05)' : 'transparent',
                                    borderLeft: isSelected ? '3px solid #00d4aa' : '3px solid transparent',
                                    transition: 'all 0.2s ease',
                                    alignItems: 'center'
                                }}
                                onMouseEnter={e => e.currentTarget.style.background = 'rgba(255,255,255,0.02)'}
                                onMouseLeave={e => e.currentTarget.style.background = isSelected ? 'rgba(0,212,170,0.05)' : 'transparent'}
                            >
                                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                                    <span style={{ fontSize: 20 }}>{asset.icon}</span>
                                    <div>
                                        <div style={{ fontWeight: 600, fontSize: 13, color: '#e1e5eb' }}>{asset.symbol}</div>
                                        <div style={{ fontSize: 11, color: '#5a6577' }}>{asset.name}</div>
                                    </div>
                                </div>
                                <div style={{
                                    textAlign: 'right',
                                    fontWeight: 700,
                                    fontSize: 14,
                                    color: '#e1e5eb',
                                    fontFamily: 'monospace'
                                }}>
                                    {current.toFixed(current > 100 ? 2 : 4)}
                                </div>
                                <div style={{
                                    textAlign: 'right',
                                    fontWeight: 600,
                                    color: isUp ? '#00d4aa' : '#ff4757',
                                    fontFamily: 'monospace'
                                }}>
                                    {isUp ? '+' : ''}{change.toFixed(2)}
                                </div>
                                <div style={{
                                    textAlign: 'right',
                                    fontWeight: 600,
                                    color: isUp ? '#00d4aa' : '#ff4757',
                                    fontFamily: 'monospace'
                                }}>
                                    {isUp ? '+' : ''}{changePercent.toFixed(2)}%
                                </div>
                                <div style={{ textAlign: 'right', fontSize: 11 }}>
                                    <div style={{ color: '#00d4aa' }}>↑ {high.toFixed(high > 100 ? 2 : 4)}</div>
                                    <div style={{ color: '#ff4757' }}>↓ {low.toFixed(low > 100 ? 2 : 4)}</div>
                                </div>
                                <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center' }}>
                                    <MiniChart
                                        data={data.slice(-20)}
                                        color={isUp ? '#00d4aa' : '#ff4757'}
                                        width={90}
                                        height={32}
                                    />
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        };

        // ==================== MARKET OVERVIEW CARD ====================
        const MarketCard = ({ title, assets, allData, onAssetSelect }) => {
            const avgChange = useMemo(() => {
                let total = 0;
                let count = 0;
                assets.forEach(asset => {
                    const data = allData[asset.id];
                    if (data && data.length >= 2) {
                        const current = data[data.length - 1].value;
                        const open = data[0].value;
                        total += ((current - open) / open) * 100;
                        count++;
                    }
                });
                return count > 0 ? (total / count).toFixed(2) : '0.00';
            }, [allData]);

            const isPositive = parseFloat(avgChange) >= 0;

            return (
                <div style={{
                    background: 'linear-gradient(135deg, #0d1117, #161b22)',
                    borderRadius: 12,
                    border: '1px solid #21262d',
                    padding: 16,
                    transition: 'all 0.3s ease'
                }}>
                    <div style={{
                        display: 'flex',
                        justifyContent: 'space-between',
                        alignItems: 'center',
                        marginBottom: 12
                    }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                            <span style={{ fontSize: 18 }}>{assets[0]?.icon}</span>
                            <h3 style={{ fontSize: 14, fontWeight: 700, color: '#e1e5eb' }}>{title}</h3>
                        </div>
                        <div style={{
                            padding: '4px 10px',
                            borderRadius: 20,
                            background: isPositive ? 'rgba(0,212,170,0.1)' : 'rgba(255,71,87,0.1)',
                            color: isPositive ? '#00d4aa' : '#ff4757',
                            fontSize: 12,
                            fontWeight: 700,
                            fontFamily: 'monospace'
                        }}>
                            {isPositive ? '+' : ''}{avgChange}%
                        </div>
                    </div>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                        {assets.slice(0, 4).map(asset => {
                            const data = allData[asset.id];
                            if (!data || data.length < 2) return null;
                            const current = data[data.length - 1].value;
                            const open = data[0].value;
                            const changePercent = ((current - open) / open * 100).toFixed(2);
                            const isUp = current >= open;

                            return (
                                <div key={asset.id}
                                    onClick={() => onAssetSelect(asset.id)}
                                    style={{
                                        display: 'flex',
                                        justifyContent: 'space-between',
                                        alignItems: 'center',
                                        padding: '8px 10px',
                                        borderRadius: 8,
                                        cursor: 'pointer',
                                        background: 'rgba(255,255,255,0.02)',
                                        transition: 'all 0.2s ease'
                                    }}
                                    onMouseEnter={e => {
                                        e.currentTarget.style.background = 'rgba(255,255,255,0.05)';
                                        e.currentTarget.style.transform = 'translateX(4px)';
                                    }}
                                    onMouseLeave={e => {
                                        e.currentTarget.style.background = 'rgba(255,255,255,0.02)';
                                        e.currentTarget.style.transform = 'translateX(0)';
                                    }}
                                >
                                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                        <span style={{ fontSize: 14 }}>{asset.icon}</span>
                                        <span style={{ fontWeight: 600, fontSize: 12, color: '#e1e5eb' }}>{asset.symbol}</span>
                                    </div>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                                        <MiniChart
                                            data={data.slice(-15)}
                                            color={isUp ? '#00d4aa' : '#ff4757'}
                                            width={60}
                                            height={22}
                                        />
                                        <div style={{ textAlign: 'right' }}>
                                            <div style={{ fontWeight: 600, fontSize: 12, color: '#e1e5eb', fontFamily: 'monospace' }}>
                                                {current.toFixed(current > 100 ? 2 : 4)}
                                            </div>
                                            <div style={{
                                                fontSize: 10,
                                                fontWeight: 600,
                                                color: isUp ? '#00d4aa' : '#ff4757',
                                                fontFamily: 'monospace'
                                            }}>
                                                {isUp ? '+' : ''}{changePercent}%
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        // ==================== MAIN APP ====================
        const App = () => {
            const [allData, setAllData] = useState({});
            const [selectedAsset, setSelectedAsset] = useState('sp500');
            const [activeTab, setActiveTab] = useState('todos');
            const [chartSize, setChartSize] = useState({ width: 800, height: 400 });
            const [currentTime, setCurrentTime] = useState(new Date());
            const containerRef = useRef(null);
            const updateInterval = useRef(null);

            // Initialize data
            useEffect(() => {
                const initialData = {};
                Object.values(ASSETS).flat().forEach(asset => {
                    initialData[asset.id] = generateInitialHistory(asset.basePrice, asset.volatility, 60);
                });
                setAllData(initialData);
            }, []);

            // Real-time updates
            useEffect(() => {
                updateInterval.current = setInterval(() => {
                    setAllData(prev => {
                        const newData = { ...prev };
                        Object.values(ASSETS).flat().forEach(asset => {
                            if (newData[asset.id] && newData[asset.id].length > 0) {
                                const lastData = newData[asset.id][newData[asset.id].length - 1];
                                const change = (Math.random() - 0.48) * asset.volatility;
                                const newValue = lastData.value + change;
                                const newDataPoint = {
                                    value: newValue,
                                    time: Date.now(),
                                    open: lastData.value,
                                    close: newValue,
                                    high: Math.max(lastData.value, newValue) + Math.random() * asset.volatility * 0.2,
                                    low: Math.min(lastData.value, newValue) - Math.random() * asset.volatility * 0.2
                                };
                                newData[asset.id] = [...newData[asset.id].slice(-120), newDataPoint];
                            }
                        });
                        return newData;
                    });
                    setCurrentTime(new Date());
                }, 1500);

                return () => clearInterval(updateInterval.current);
            }, []);

            // Resize handler
            useEffect(() => {
                const handleResize = () => {
                    if (containerRef.current) {
                        const width = containerRef.current.offsetWidth;
                        setChartSize({
                            width: Math.min(width - 32, 1200),
                            height: window.innerWidth < 768 ? 300 : 420
                        });
                    }
                };
                handleResize();
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            const selectedAssetData = allData[selectedAsset];
            const selectedAssetInfo = Object.values(ASSETS).flat().find(a => a.id === selectedAsset);

            const tabs = [
                { id: 'todos', label: '🌐 Todos', assets: Object.values(ASSETS).flat() },
                { id: 'metales', label: '🥇 Metales', assets: ASSETS.metales },
                { id: 'bolsa', label: '📊 Bolsa', assets: ASSETS.bolsa },
                { id: 'acciones', label: '🏢 Acciones', assets: ASSETS.acciones },
                { id: 'bienesraices', label: '🏠 Bienes Raíces', assets: ASSETS.bienesRaices },
                { id: 'crypto', label: '₿ Crypto', assets: ASSETS.crypto },
                { id: 'forex', label: '💱 Forex', assets: ASSETS.forex },
            ];

            const currentTab = tabs.find(t => t.id === activeTab);
            const currentAssets = currentTab?.assets || [];

            return (
                <div style={{ minHeight: '100vh', background: '#0a0e17' }}>
                    {/* Header */}
                    <header style={{
                        background: 'linear-gradient(180deg, #0d1117, #0a0e17)',
                        borderBottom: '1px solid #21262d',
                        padding: '12px 24px',
                        display: 'flex',
                        justifyContent: 'space-between',
                        alignItems: 'center',
                        flexWrap: 'wrap',
                        gap: 12
                    }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                            <div style={{
                                width: 36, height: 36, borderRadius: 10,
                                background: 'linear-gradient(135deg, #00d4aa, #007a5e)',
                                display: 'flex', alignItems: 'center', justifyContent: 'center',
                                fontSize: 18, fontWeight: 900, color: '#fff'
                            }}>T</div>
                            <div>
                                <h1 style={{ fontSize: 18, fontWeight: 800, color: '#e1e5eb', letterSpacing: -0.5 }}>
                                    TradeView <span style={{ color: '#00d4aa' }}>Pro</span>
                                </h1>
                                <div style={{ fontSize: 11, color: '#5a6577' }}>
                                    Mercados en Tiempo Real
                                </div>
                            </div>
                        </div>

                        <div style={{ display: 'flex', alignItems: 'center', gap: 20 }}>
                            <div style={{
                                display: 'flex', alignItems: 'center', gap: 6,
                                background: '#161b22', padding: '6px 12px', borderRadius: 8,
                                border: '1px solid #21262d'
                            }}>
                                <div style={{
                                    width: 8, height: 8, borderRadius: '50%',
                                    background: '#00d4aa',
                                    boxShadow: '0 0 8px #00d4aa',
                                    animation: 'pulse-green 1.5s infinite'
                                }} />
                                <span style={{ fontSize: 12, color: '#8b949e', fontFamily: 'monospace' }}>
                                    {currentTime.toLocaleTimeString('es')}
                                </span>
                            </div>
                            <div style={{
                                display: 'flex', alignItems: 'center', gap: 6,
                                background: '#161b22', padding: '6px 12px', borderRadius: 8,
                                border: '1px solid #21262d'
                            }}>
                                <span style={{ fontSize: 11, color: '#5a6577' }}>UTC</span>
                                <span style={{ fontSize: 12, color: '#e1e5eb', fontFamily: 'monospace' }}>
                                    {currentTime.toLocaleTimeString('en', { hour12: false })}
                                </span>
                            </div>
                        </div>
                    </header>

                    {/* Ticker Strip */}
                    <TickerStrip assets={ASSETS} allData={allData} />

                    <div ref={containerRef} style={{ maxWidth: 1400, margin: '0 auto', padding: '16px 16px 40px' }}>
                        {/* Main Chart */}
                        {selectedAssetData && selectedAssetInfo && (
                            <div className="slide-in" style={{ marginBottom: 20 }}>
                                <LargeChart
                                    data={selectedAssetData}
                                    symbol={selectedAssetInfo.symbol}
                                    name={selectedAssetInfo.name}
                                    width={chartSize.width}
                                    height={chartSize.height}
                                />
                            </div>
                        )}

                        {/* Tabs */}
                        <div style={{
                            display: 'flex',
                            gap: 6,
                            marginBottom: 16,
                            overflowX: 'auto',
                            paddingBottom: 4
                        }}>
                            {tabs.map(tab => (
                                <button key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    style={{
                                        padding: '8px 16px',
                                        borderRadius: 8,
                                        border: activeTab === tab.id ? '1px solid #00d4aa' : '1px solid #21262d',
                                        background: activeTab === tab.id
                                            ? 'rgba(0,212,170,0.1)'
                                            : '#161b22',
                                        color: activeTab === tab.id ? '#00d4aa' : '#8b949e',
                                        cursor: 'pointer',
                                        fontSize: 12,
                                        fontWeight: 600,
                                        whiteSpace: 'nowrap',
                                        transition: 'all 0.2s ease',
                                        fontFamily: 'Inter, sans-serif'
                                    }}
                                >
                                    {tab.label}
                                </button>
                            ))}
                        </div>

                        {/* Market Table */}
                        <div style={{ marginBottom: 24, overflowX: 'auto' }}>
                            <MarketTable
                                assets={currentAssets}
                                allData={allData}
                                selectedAsset={selectedAsset}
                                onSelect={setSelectedAsset}
                            />
                        </div>

                        {/* Market Overview Cards */}
                        <div style={{
                            display: 'grid',
                            gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))',
                            gap: 16
                        }}>
                            {Object.entries(ASSETS).map(([key, assets]) => (
                                <MarketCard
                                    key={key}
                                    title={
                                        key === 'metales' ? '🥇 Metales Preciosos' :
                                        key === 'bolsa' ? '📊 Índices Bursátiles' :
                                        key === 'acciones' ? '🏢 Acciones Tech' :
                                        key === 'bienesRaices' ? '🏠 Bienes Raíces' :
                                        key === 'crypto' ? '₿ Criptomonedas' :
                                        '💱 Forex'
                                    }
                                    assets={assets}
                                    allData={allData}
                                    onAssetSelect={(id) => {
                                        setSelectedAsset(id);
                                        setActiveTab(key);
                                    }}
                                />
                            ))}
                        </div>

                        {/* Footer */}
                        <div style={{
                            textAlign: 'center',
                            padding: '30px 0 10px',
                            borderTop: '1px solid #21262d',
                            marginTop: 30
                        }}>
                            <div style={{ color: '#5a6577', fontSize: 12 }}>
                                📊 TradeView Pro — Dashboard Financiero en Tiempo Real
                            </div>
                            <div style={{ color: '#30363d', fontSize: 11, marginTop: 4 }}>
                                Datos simulados con actualización en tiempo real • React + Canvas
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
