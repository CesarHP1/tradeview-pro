            const audioContext = useRef(null);

            useEffect(() => {
                audioContext.current = new (window.AudioContext || window.webkitAudioContext)();
            }, []);

            const playTone = (frequency, duration, type = 'sine', volume = 0.1) => {
                if (!audioContext.current) return;
                
                const oscillator = audioContext.current.createOscillator();
                const gainNode = audioContext.current.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.current.destination);
                
                oscillator.frequency.value = frequency;
                oscillator.type = type;
                
                gainNode.gain.setValueAtTime(volume, audioContext.current.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.current.currentTime + duration);
                
                oscillator.start(audioContext.current.currentTime);
                oscillator.stop(audioContext.current.currentTime + duration);
            };

            const playClick = () => {
                playTone(800, 0.1, 'sine', 0.15);
                setTimeout(() => playTone(1200, 0.08, 'sine', 0.1), 30);

        const useVoiceAssistant = () => {
            const [isEnabled, setIsEnabled] = useState(false);
            const [currentVoice, setCurrentVoice] = useState(null);
            const [lastAnnouncement, setLastAnnouncement] = useState('');
            const synth = useRef(window.speechSynthesis);
            const voices = useRef([]);

            useEffect(() => {
                const loadVoices = () => {
                    voices.current = synth.current.getVoices();
                    const femaleVoice = voices.current.find(voice => 
                        voice.lang.includes('es') && 
                        (voice.name.includes('Female') || voice.name.includes('Femenina') || voice.name.includes('Google español') || voice.name.includes('Monica'))
                    ) || voices.current.find(voice => voice.lang.includes('es'));

                        setCurrentVoice(femaleVoice);
                    }
                };

                loadVoices();
                if (speechSynthesis.onvoiceschanged !== undefined) {
                    speechSynthesis.onvoiceschanged = loadVoices;
                }
            }, []);

            const speak = useCallback((text, priority = 'normal', rate = 0.9) => {
                if (!isEnabled || !currentVoice) return;

                if (priority === 'high') {
                    synth.current.cancel();
                }

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.voice = currentVoice;
                utterance.lang = 'es-ES';
                utterance.rate = rate;
                utterance.pitch = 1.0;
                utterance.volume = 0.85;

                synth.current.speak(utterance);
                setLastAnnouncement(text);
            }, [isEnabled, currentVoice]);

            const toggleVoice = () => {
                if (isEnabled) {
                    synth.current.cancel();
                }
                setIsEnabled(!isEnabled);
            };

            return { isEnabled, toggleVoice, speak, lastAnnouncement };

            const canvasRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas || data.length < 2) return;
                const ctx = canvas.getContext('2d');
                const dpr = window.devicePixelRatio || 1;
                canvas.width = width * dpr;
                canvas.height = height * dpr;
                ctx.scale(dpr, dpr);

                const values = data.map(d => d.close || d.value);
                const min = Math.min(...values);
                const max = Math.max(...values);
                const range = max - min || 1;

                ctx.clearRect(0, 0, width, height);

                const gradient = ctx.createLinearGradient(0, 0, 0, height);
                gradient.addColorStop(0, color + '40');
                gradient.addColorStop(1, color + '05');

                ctx.beginPath();
                ctx.moveTo(0, height);
                data.forEach((d, i) => {
                    const x = (i / (data.length - 1)) * width;
                    const y = height - ((d.close - min) / range) * (height - 4) - 2;
                    ctx.lineTo(x, y);
                });
                ctx.lineTo(width, height);
                ctx.closePath();
                ctx.fillStyle = gradient;
                ctx.fill();

                ctx.beginPath();
                data.forEach((d, i) => {
                    const x = (i / (data.length - 1)) * width;
                    const y = height - ((d.close - min) / range) * (height - 4) - 2;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                });
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                ctx.stroke();
            }, [data, color, width, height]);

            return <canvas ref={canvasRef} width={width} height={height} style={{ width, height }} />;
        };

        // ==================== LARGE CHART ====================
        const LargeChart = ({ data, symbol, name, width, height }) => {
            const canvasRef = useRef(null);
            const [hoveredIndex, setHoveredIndex] = useState(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas || data.length < 2) return;
                const ctx = canvas.getContext('2d');
                const dpr = window.devicePixelRatio || 1;
                canvas.width = width * dpr;
                canvas.height = height * dpr;
                ctx.scale(dpr, dpr);

                const values = data.map(d => d.value || d.close);
                const highs = data.map(d => d.high);
                const lows = data.map(d => d.low);
                const min = Math.min(...lows) * 0.998;
                const max = Math.max(...highs) * 1.002;
                const range = max - min || 1;
                const padding = { top: 40, right: 70, bottom: 50, left: 10 };
                const chartW = width - padding.left - padding.right;
                const chartH = height - padding.top - padding.bottom;

                const isUp = data[data.length - 1].value >= data[0].value;
                const mainColor = isUp ? '#00d4aa' : '#ff4757';

                ctx.clearRect(0, 0, width, height);
                ctx.fillStyle = '#0d1117';
                ctx.beginPath();
                ctx.roundRect(0, 0, width, height, 12);
                ctx.fill();

                ctx.strokeStyle = '#1c2333';
                ctx.lineWidth = 0.5;
                for (let i = 0; i <= 6; i++) {
                    const y = padding.top + (i / 6) * chartH;
                    ctx.beginPath();
                    ctx.moveTo(padding.left, y);
                    ctx.lineTo(width - padding.right, y);
                    ctx.stroke();
                    const price = max - (i / 6) * range;
                    ctx.fillStyle = '#5a6577';
                    ctx.font = '11px Inter';
                    ctx.fillText(price.toFixed(price > 100 ? 2 : 4), width - padding.right + 8, y + 4);
                }

                const gradient = ctx.createLinearGradient(0, padding.top, 0, height - padding.bottom);
                gradient.addColorStop(0, mainColor + '30');
                gradient.addColorStop(1, mainColor + '00');
                ctx.beginPath();
                ctx.moveTo(padding.left, height - padding.bottom);
                data.forEach((d, i) => {
                    const x = padding.left + (i / (data.length - 1)) * chartW;
                    const y = padding.top + (1 - (d.value - min) / range) * chartH;
                    ctx.lineTo(x, y);
                });
                ctx.lineTo(padding.left + chartW, height - padding.bottom);
                ctx.closePath();
                ctx.fillStyle = gradient;
                ctx.fill();

                ctx.beginPath();
                data.forEach((d, i) => {
                    const x = padding.left + (i / (data.length - 1)) * chartW;
                    const y = padding.top + (1 - (d.value - min) / range) * chartH;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                });
                ctx.strokeStyle = mainColor;
                ctx.lineWidth = 2.5;
                ctx.stroke();

                if (hoveredIndex !== null && hoveredIndex < data.length) {
                    const hx = padding.left + (hoveredIndex / (data.length - 1)) * chartW;
                    const hy = padding.top + (1 - (data[hoveredIndex].value - min) / range) * chartH;
                    ctx.setLineDash([4, 4]);
                    ctx.strokeStyle = '#4a5568';
                    ctx.beginPath();
                    ctx.moveTo(hx, padding.top);
                    ctx.lineTo(hx, height - padding.bottom);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }

                ctx.fillStyle = '#e1e5eb';
                ctx.font = 'bold 15px Inter';
                ctx.fillText(`${symbol}  ${name}`, padding.left + 15, 25);

            }, [data, symbol, name, width, height, hoveredIndex]);

            return (
                <div style={{ position: 'relative' }}>
                    <canvas
                        ref={canvasRef}
                        width={width}
                        height={height}
                        style={{ width, height, cursor: 'crosshair', borderRadius: 12 }}
                        onMouseMove={(e) => {
                            const rect = canvasRef.current.getBoundingClientRect();
                            const x = e.clientX - rect.left;
                            const padding = { left: 10, right: 70 };
                            const chartW = width - padding.left - padding.right;
                            const index = Math.round(((x - padding.left) / chartW) * (data.length - 1));
                            if (index >= 0 && index < data.length) setHoveredIndex(index);
                        }}
                        onMouseLeave={() => setHoveredIndex(null)}
                    />
                </div>
            );
        };

        // ==================== NEWS TICKER ====================
        const NewsTicker = ({ news, onNewsSpeak, playHover }) => {
            return (
                <div style={{
                    background: 'linear-gradient(90deg, #1a1f2e, #2d3748, #1a1f2e)',
                    borderBottom: '2px solid #667eea',
                    overflow: 'hidden',
                    height: 55,
                    display: 'flex',
                    alignItems: 'center',
                    position: 'relative'
                }}>
                    <div style={{
                        position: 'absolute',
                        left: 0,
                        top: 0,
                        bottom: 0,
                        background: 'linear-gradient(135deg, #667eea, #764ba2)',
                        padding: '0 24px',
                        display: 'flex',
                        alignItems: 'center',
                        fontWeight: 800,
                        fontSize: 12,
                        zIndex: 10,
                        minWidth: 140
                    }}>
                        🔴 LIVE NEWS
                    </div>
                    <div className="ticker-animation" style={{
                        display: 'flex',
                        gap: 80,
                        whiteSpace: 'nowrap',
                        paddingLeft: 160
                    }}>
                        {[...news, ...news, ...news].map((item, i) => (
                            <div key={`${item.id}-${i}`} 
                                onClick={() => onNewsSpeak(item)}
                                style={{
                                    display: 'flex',
                                    alignItems: 'center',
                                    gap: 12,
                                    fontSize: 13,
                                    cursor: 'pointer',
                                    padding: '10px 20px',
                                    borderRadius: 10,
                                    background: item.impact === 'positive' ? 'rgba(0,212,170,0.15)' : 
                                               item.impact === 'negative' ? 'rgba(255,71,87,0.15)' : 'rgba(255,255,255,0.08)',
                                    border: `2px solid ${item.impact === 'positive' ? '#00d4aa' : item.impact === 'negative' ? '#ff4757' : '#4a5568'}`,
                                    transition: 'all 0.3s',
                                    fontWeight: 600
                                }}
                                onMouseEnter={e => {
                                    playHover();
                                    e.currentTarget.style.transform = 'scale(1.05)';
                                }}
                                onMouseLeave={e => {
                                    e.currentTarget.style.transform = 'scale(1)';
                                }}
                            >
                                <span>{item.text}</span>
                                <span style={{
                                    padding: '3px 10px',
                                    borderRadius: 6,
                                    background: item.impact === 'positive' ? '#00d4aa' : item.impact === 'negative' ? '#ff4757' : '#4a5568',
                                    color: '#fff',
                                    fontSize: 10,
                                    fontWeight: 800
                                }}>
                                    {item.recommendation}
                                </span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // ==================== MARKET TABLE ====================
        const MarketTable = ({ assets, allData, selectedAsset, onSelect, onAnalyze, playClick, playHover }) => {
            const [flashStates, setFlashStates] = useState({});
            const prevPrices = useRef({});

            useEffect(() => {
                const newFlashes = {};
                assets.forEach(asset => {
                    const currentPrice = allData[asset.id]?.price;
                    const prevPrice = prevPrices.current[asset.id];
                    if (currentPrice && prevPrice && currentPrice !== prevPrice) {
                        newFlashes[asset.id] = currentPrice > prevPrice ? 'up' : 'down';
                    }
                    if (currentPrice) prevPrices.current[asset.id] = currentPrice;
                });
                if (Object.keys(newFlashes).length > 0) {
                    setFlashStates(prev => ({ ...prev, ...newFlashes }));
                    setTimeout(() => setFlashStates({}), 600);
                }
            }, [allData]);

            return (
                <div style={{
                    background: '#0d1117',
                    borderRadius: 12,
                    border: '1px solid #21262d',
                    overflow: 'hidden'
                }}>
                    <div style={{
                        display: 'grid',
                        gridTemplateColumns: '2.5fr 1.2fr 1fr 1fr 120px 130px',
                        padding: '12px 20px',
                        background: '#161b22',
                        borderBottom: '2px solid #21262d',
                        fontSize: 11,
                        color: '#5a6577',
                        fontWeight: 800
                    }}>
                        <span>Activo</span>
                        <span style={{ textAlign: 'right' }}>Precio</span>
                        <span style={{ textAlign: 'right' }}>Cambio 24h</span>
                        <span style={{ textAlign: 'right' }}>Cambio %</span>
                        <span style={{ textAlign: 'center' }}>Tendencia</span>
                        <span style={{ textAlign: 'center' }}>Análisis AI</span>
                    </div>
                    {assets.map(asset => {
                        const data = allData[asset.id];
                        if (!data) return null;
                        const current = data.price;
                        const change = data.change || 0;
                        const changePercent = data.change || 0;
                        const isUp = change >= 0;
                        const flash = flashStates[asset.id];
                        const history = generateHistoryFromPrice(current, asset.volatility / 100, 50);

                        return (
                            <div key={asset.id}
                                className={`slide-in ${flash === 'up' ? 'flash-up' : flash === 'down' ? 'flash-down' : ''}`}
                                onClick={() => { playClick(); onSelect(asset.id); }}
                                onMouseEnter={playHover}
                                style={{
                                    display: 'grid',
                                    gridTemplateColumns: '2.5fr 1.2fr 1fr 1fr 120px 130px',
                                    padding: '14px 20px',
                                    borderBottom: '1px solid #161b22',
                                    cursor: 'pointer',
                                    background: selectedAsset === asset.id ? 'rgba(102,126,234,0.08)' : 'transparent',
                                    borderLeft: selectedAsset === asset.id ? '4px solid #667eea' : '4px solid transparent',
                                    alignItems: 'center'
                                }}
                            >
                                <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                                    <span style={{ fontSize: 24 }}>{asset.icon}</span>
                                    <div>
                                        <div style={{ fontWeight: 700, fontSize: 14 }}>{asset.symbol}</div>
                                        <div style={{ fontSize: 11, color: '#5a6577' }}>{asset.name}</div>
                                    </div>
                                </div>
                                <div style={{ textAlign: 'right', fontWeight: 800, fontSize: 15, fontFamily: 'monospace' }}>
                                    ${current.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: current < 10 ? 4 : 2 })}
                                </div>
                                <div style={{ textAlign: 'right', fontWeight: 700, color: isUp ? '#00d4aa' : '#ff4757', fontFamily: 'monospace' }}>
                                    {isUp ? '+' : ''}{change.toFixed(2)}
                                </div>
                                <div style={{ textAlign: 'right', fontWeight: 700, color: isUp ? '#00d4aa' : '#ff4757', fontFamily: 'monospace' }}>
                                    {isUp ? '+' : ''}{changePercent.toFixed(2)}%
                                </div>
                                <div style={{ display: 'flex', justifyContent: 'center' }}>
                                    <MiniChart data={history} color={isUp ? '#00d4aa' : '#ff4757'} width={110} height={36} />
                                </div>
                                <div style={{ display: 'flex', justifyContent: 'center' }}>
                                    <button
                                        onClick={(e) => {
                                            e.stopPropagation();
                                            playClick();
                                            onAnalyze(asset, isUp, changePercent, current);
                                        }}
                                        className="analyze-btn"
                                        onMouseEnter={playHover}
                                    >
                                        🎤 Analizar AI
                                    </button>
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        };

        // ==================== MAIN APP ====================
        const App = () => {
            const [selectedAsset, setSelectedAsset] = useState('btc');
            const [activeTab, setActiveTab] = useState('crypto');
            const [chartSize, setChartSize] = useState({ width: 900, height: 450 });
            const { cryptoData, forexData, stockData, loading, lastUpdate, error } = useRealTimeData();
            const { isEnabled, toggleVoice, speak } = useVoiceAssistant();
            const { playClick, playHover, playSuccess, playAlert } = useASMRSounds();
            const containerRef = useRef(null);

            useEffect(() => {
                const handleResize = () => {
                    if (containerRef.current) {
                        setChartSize({
                            width: Math.min(containerRef.current.offsetWidth - 32, 1200),
                            height: window.innerWidth < 768 ? 350 : 480
                        });
                    }
                };
                handleResize();
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            // Combinar todos los datos
            const allData = useMemo(() => ({
                ...cryptoData,
                ...forexData,
                ...stockData
            }), [cryptoData, forexData, stockData]);

            const handleAnalyze = (asset, isUp, changePercent, currentPrice) => {
                const analysis = `Analizando ${asset.name}. Precio actual: $${currentPrice.toLocaleString()}. Tendencia ${isUp ? 'alcista' : 'bajista'} con ${Math.abs(changePercent).toFixed(2)}%. ${isUp ? 'Momentum positivo, considera comprar en retrocesos.' : 'Espera confirmación de reversión antes de entrar.'}`;
                speak(analysis, 'high', 0.85);
                playSuccess();
            };

            const handleNewsClick = (news) => {
                playClick();
                speak(`${news.text}. ${news.analysis}. Recomendación: ${news.recommendation}.`, 'high', 0.85);
                playSuccess();
            };

            const tabs = [
                { id: 'crypto', label: '₿ Crypto', assets: ASSETS.crypto },
                { id: 'forex', label: '💱 Forex', assets: ASSETS.forex },
                { id: 'bolsa', label: '📊 Índices', assets: ASSETS.bolsa },
                { id: 'acciones', label: '🏢 Acciones', assets: ASSETS.acciones },
                { id: 'metales', label: '🥇 Metales', assets: ASSETS.metales },
                { id: 'energia', label: '⚡ Energía', assets: ASSETS.energia },
            ];

            const currentTab = tabs.find(t => t.id === activeTab) || tabs[0];
            const selectedAssetData = allData[selectedAsset];
            const selectedAssetInfo = Object.values(ASSETS).flat().find(a => a.id === selectedAsset);

            // Generar historial para el gráfico principal
            const chartHistory = selectedAssetData ? 
                generateHistoryFromPrice(selectedAssetData.price, 0.02, 100) : [];

            return (
                <div style={{ minHeight: '100vh' }}>
                    <header style={{
                        background: 'linear-gradient(180deg, #0d1117, #0a0e17)',
                        borderBottom: '2px solid #21262d',
                        padding: '16px 24px',
                        display: 'flex',
                        justifyContent: 'space-between',
                        alignItems: 'center',
                        flexWrap: 'wrap',
                        gap: 16
                    }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
                            <div style={{
                                width: 42, height: 42, borderRadius: 12,
                                background: 'linear-gradient(135deg, #667eea, #764ba2)',
                                display: 'flex', alignItems: 'center', justifyContent: 'center',
                                fontSize: 22, fontWeight: 900
                            }}>T</div>
                            <div>
                                <h1 style={{ fontSize: 20, fontWeight: 800 }}>
                                    TradeView <span style={{ color: '#667eea' }}>Pro AI</span>
                                </h1>
                                <div style={{ fontSize: 11, color: '#5a6577' }}>
                                    Datos Reales en Tiempo Real
                                </div>
                            </div>
                        </div>

                        <div style={{ display: 'flex', alignItems: 'center', gap: 20 }}>
                            {lastUpdate && (
                                <div className="live-indicator">
                                    <div className="live-dot"></div>
                                    <span>LIVE • {lastUpdate.toLocaleTimeString()}</span>
                                </div>
                            )}
                            <button 
                                onClick={() => { playClick(); toggleVoice(); }}
                                className={`voice-btn ${isEnabled ? 'active' : ''}`}
                                onMouseEnter={playHover}
                            >
                                <span>{isEnabled ? '🔊' : '🔇'}</span>
                                <span>{isEnabled ? 'Voz ON' : 'Voz OFF'}</span>
                            </button>
                        </div>
                    </header>

                    <NewsTicker news={NEWS_DATA} onNewsSpeak={handleNewsClick} playHover={playHover} />

                    <div ref={containerRef} style={{ maxWidth: 1400, margin: '0 auto', padding: '20px' }}>
                        {loading ? (
                            <div style={{ textAlign: 'center', padding: 60 }}>
                                <div className="loading-spinner" style={{ margin: '0 auto 20px' }}></div>
                                <div>Cargando datos reales del mercado...</div>
                            </div>
                        ) : (
                            <>
                                {selectedAssetData && selectedAssetInfo && (
                                    <div className="slide-in" style={{ marginBottom: 24 }}>
                                        <LargeChart
                                            data={chartHistory}
                                            symbol={selectedAssetInfo.symbol}
                                            name={selectedAssetInfo.name}
                                            width={chartSize.width}
                                            height={chartSize.height}
                                        />
                                        <div style={{ 
                                            marginTop: 12, 
                                            padding: '12px 20px', 
                                            background: '#0d1117', 
                                            borderRadius: 8,
                                            display: 'flex',
                                            justifyContent: 'space-between',
                                            alignItems: 'center',
                                            border: '1px solid #21262d'
                                        }}>
                                            <div>
                                                <div style={{ fontSize: 12, color: '#5a6577' }}>Precio Actual</div>
                                                <div style={{ fontSize: 24, fontWeight: 800, fontFamily: 'monospace' }}>
                                                    ${selectedAssetData.price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 4 })}
                                                </div>
                                            </div>
                                            <div>
                                                <div style={{ fontSize: 12, color: '#5a6577' }}>Cambio 24h</div>
                                                <div style={{ 
                                                    fontSize: 20, 
                                                    fontWeight: 700, 
                                                    color: selectedAssetData.change >= 0 ? '#00d4aa' : '#ff4757',
                                                    fontFamily: 'monospace'
                                                }}>
                                                    {selectedAssetData.change >= 0 ? '+' : ''}{selectedAssetData.change?.toFixed(2)}%
                                                </div>
                                            </div>
                                            <div>
                                                <div style={{ fontSize: 12, color: '#5a6577' }}>Última Actualización</div>
                                                <div style={{ fontSize: 14, fontWeight: 600 }}>
                                                    {lastUpdate ? lastUpdate.toLocaleTimeString() : '--:--:--'}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                <div style={{ display: 'flex', gap: 10, marginBottom: 24, overflowX: 'auto' }}>
                                    {tabs.map(tab => (
                                        <button 
                                            key={tab.id} 
                                            className={`tab-btn ${activeTab === tab.id ? 'active' : ''}`}
                                            onClick={() => { playClick(); setActiveTab(tab.id); }}
                                            onMouseEnter={playHover}
                                        >
                                            <span>{tab.label}</span>
                                        </button>
                                    ))}
                                </div>

                                <MarketTable
                                    assets={currentTab.assets}
                                    allData={allData}
                                    selectedAsset={selectedAsset}
                                    onSelect={setSelectedAsset}
                                    onAnalyze={handleAnalyze}
                                    playClick={playClick}
                                    playHover={playHover}
                                />

                                <div style={{
                                    textAlign: 'center',
                                    padding: '40px 20px',
                                    marginTop: 40,
                                    borderTop: '2px solid #21262d',
                                    color: '#5a6577',
                                    fontSize: 12
                                }}>
                                    <div>🔌 APIs: CoinGecko (Crypto) • ExchangeRate-API (Forex)</div>
                                    <div style={{ marginTop: 4 }}>Actualización automática cada 10 segundos • Datos reales del mercado</div>
                                </div>
                            </>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
